<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Vật Lí 12 – CK2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;--card:#ffffff;--border:#cdd8e8;--text:#1a2535;--muted:#4a6080;
  --blue:#1565c0;--blue-light:#e3f2fd;--blue-mid:#90caf9;
  --red:#b52b2b;--red-light:#fce8e8;
  --green:#1e6e32;--green-light:#e8f5e9;
  --amber:#7a5500;--amber-light:#fff8e1;
  --purple:#512da8;--purple-light:#ede7f6;
  --radius:10px;--radius-lg:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
h2.sr{position:absolute;left:-9999px}
.container{max-width:740px;margin:0 auto}

.header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.title-block h1{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.title-block p{font-size:12px;color:var(--muted)}
.stats{display:flex;gap:14px;align-items:center;flex-shrink:0}
.stat{text-align:center;min-width:38px}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-n.blue{color:var(--blue)}.stat-n.green{color:var(--green)}.stat-n.red{color:var(--red)}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-weight:500;transition:all .15s}
.tab:hover{background:#eef3fa}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}

.type-row{display:flex;gap:6px;margin-bottom:12px}
.ttab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-weight:500;transition:all .15s}
.ttab:hover{background:#eef3fa}
.ttab.active-mc{background:var(--blue);border-color:var(--blue);color:#fff}
.ttab.active-tf{background:var(--amber);border-color:var(--amber);color:#fff}
.ttab.active-sa{background:var(--purple);border-color:var(--purple);color:#fff}
.ttab.active-all{background:#2e2e2e;border-color:#2e2e2e;color:#fff}

.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:7px;background:#cdd8e8;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--blue)}
.prog-label{font-size:12px;color:var(--muted);min-width:50px;text-align:right}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:14px;min-height:240px}
.qcard-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-mc{background:var(--blue-light);color:var(--blue)}
.badge-tf{background:var(--amber-light);color:var(--amber)}
.badge-sa{background:var(--purple-light);color:var(--purple)}
.badge-chu{font-size:11px;padding:3px 10px;border-radius:20px;background:#e8edf5;color:var(--muted);font-weight:500}
.qnum{margin-left:auto;font-size:12px;color:var(--muted)}
.qtext{font-size:14.5px;font-weight:500;line-height:1.7;color:var(--text);margin-bottom:18px;white-space:pre-wrap}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.opt{background:#f7f9fc;border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;line-height:1.5;transition:border-color .12s,background .12s;display:flex;gap:10px;align-items:flex-start}
.opt-key{font-weight:700;color:var(--muted);flex-shrink:0;font-size:13px;min-width:18px}
.opt:hover:not(:disabled){background:#e8f0fb;border-color:#90caf9}
.opt.correct{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.opt.correct .opt-key{color:var(--green)}
.opt.wrong{background:var(--red-light);border-color:#e57373;color:var(--red)}
.opt.wrong .opt-key{color:var(--red)}
.opt:disabled{cursor:default}

/* TRUE/FALSE */
.tf-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:520px){.tf-opts{grid-template-columns:1fr}}
.tf-item{background:#f7f9fc;border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.tf-stmt{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px}
.tf-stmt strong{color:var(--muted);margin-right:4px}
.tf-btns{display:flex;gap:8px}
.tf-btn{flex:1;padding:7px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s}
.tf-btn.t-btn:hover:not(:disabled){background:#e8f5e9;border-color:#4caf50;color:var(--green)}
.tf-btn.f-btn:hover:not(:disabled){background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn.selected-t{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.tf-btn.selected-f{background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn.reveal-t{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.tf-btn.reveal-f{background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn:disabled{cursor:default;opacity:.75}
.tf-result-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.tf-check{font-size:13px;font-weight:600}
.tf-check.ok{color:var(--green)}.tf-check.no{color:var(--red)}

/* SHORT ANSWER */
.sa-input-wrap{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.sa-input{flex:1;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);background:#f7f9fc;color:var(--text);resize:vertical;min-height:60px;font-family:inherit}
.sa-input:focus{outline:none;border-color:#90caf9;background:#fff}
.sa-submit{padding:10px 18px;border-radius:var(--radius);background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.sa-submit:hover{background:#0d47a1}
.sa-answer{border-radius:var(--radius);padding:14px 16px;font-size:13px;line-height:1.65;margin-top:6px}
.sa-answer.correct-ans{background:var(--green-light);border-left:3px solid var(--green);color:#0d3d1e}
.sa-answer.wrong-ans{background:var(--red-light);border-left:3px solid var(--red);color:#5a0d0d}
.sa-answer.shown-ans{background:var(--blue-light);border-left:3px solid var(--blue);color:#0d2060}
.sa-answer strong{display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.sa-verdict{font-size:14px;font-weight:700;margin-bottom:6px}
.sa-verdict.ok{color:var(--green)}.sa-verdict.no{color:var(--red)}

.nav{display:flex;gap:8px;align-items:center}
.btn{padding:9px 20px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);cursor:pointer;font-weight:500;transition:all .12s}
.btn:hover{background:#e8f0fb;border-color:#90caf9}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#0d47a1}
.btn.ok-btn{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.btn.ok-btn:hover{background:#c8e6c9}
.btn.no-btn{background:var(--red-light);border-color:#e57373;color:var(--red)}
.btn.no-btn:hover{background:#ffcdd2}
.nav-spacer{flex:1}

.score-circle{width:100px;height:100px;border-radius:50%;background:var(--blue-light);border:3px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;flex-direction:column}

/* UPDATE LOG */
.log-toggle{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);text-align:left;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:all .15s}
.log-toggle:hover{background:#eef3fa}
.log-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px;display:none}
.log-panel.open{display:block}
.log-entry{padding:8px 0;border-bottom:1px solid #eef1f6;font-size:12.5px;line-height:1.6}
.log-entry:last-child{border-bottom:none}
.log-date{font-weight:600;color:var(--blue);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.log-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-right:6px;vertical-align:middle}
.log-badge.add{background:#e8f5e9;color:var(--green)}
.log-badge.fix{background:#fff8e1;color:var(--amber)}
.log-badge.update{background:#e3f2fd;color:var(--blue)}
</style>
</head>

<!-- Dữ liệu câu hỏi (nhúng inline để chạy được khi mở file trực tiếp) -->
<script src="li12_data.js"></script>

<script>
// RUNTIME
var curChu = 'ALL', curType = 'ALL';
var pool = [], cur = 0, correct = 0, wrong = 0, answered = [];
var tfTemp = [];

var CHU_LABEL = {'TT':'Từ Trường','HN':'Vật lý Hạt nhân'};

function filterPool(){
  var all = [];
  if(curType==='MC'||curType==='ALL'){
    var mc = curChu==='ALL' ? MC : MC.filter(function(q){return q.c===curChu;});
    mc.forEach(function(q){ var x={}; for(var k in q) x[k]=q[k]; x._type='MC'; all.push(x); });
  }
  if(curType==='TF'||curType==='ALL'){
    var tf = curChu==='ALL' ? TF : TF.filter(function(q){return q.c===curChu;});
    tf.forEach(function(q){ var x={}; for(var k in q) x[k]=q[k]; x._type='TF'; all.push(x); });
  }
  if(curType==='SA'||curType==='ALL'){
    var sa = curChu==='ALL' ? SA : SA.filter(function(q){return q.c===curChu;});
    sa.forEach(function(q){ var x={}; for(var k in q) x[k]=q[k]; x._type='SA'; all.push(x); });
  }
  return all;
}

function setChu(c,el){
  curChu = c;
  document.querySelectorAll('#chu-tabs .tab').forEach(function(t){t.classList.remove('active');});
  (el||event.target).classList.add('active');
  resetPool();
}

function setType(t,el){
  curType = t;
  document.querySelectorAll('#type-tabs .ttab').forEach(function(tb){
    tb.classList.remove('active-mc','active-tf','active-sa','active-all');
  });
  var map={'MC':'active-mc','TF':'active-tf','SA':'active-sa','ALL':'active-all'};
  (el||event.target).classList.add(map[t]);
  resetPool();
}

function resetPool(){
  pool = filterPool();
  cur = 0; correct = 0; wrong = 0;
  answered = [];
  for(var i=0;i<pool.length;i++) answered.push(null);
  tfTemp = [];
  document.getElementById('s-total').textContent = pool.length;
  document.getElementById('s-correct').textContent = 0;
  document.getElementById('s-wrong').textContent = 0;
  var cLabel = curChu==='ALL'?'Tất cả chương':(CHU_LABEL[curChu]||curChu);
  var tLabel = {'MC':'Trắc nghiệm','TF':'Đúng/Sai','SA':'Trả lời ngắn','ALL':'Tất cả'}[curType];
  document.getElementById('subtitle').textContent = cLabel + ' – ' + tLabel + ' – ' + pool.length + ' câu';
  render();
}

function render(){
  if(!pool.length){
    document.getElementById('qtext').textContent = 'Không có câu hỏi nào trong bộ lọc này.';
    document.getElementById('q-body').innerHTML = '';
    return;
  }
  var q = pool[cur];
  var typeLabel = {'MC':'Trắc nghiệm','TF':'Đúng/Sai','SA':'Trả lời ngắn'}[q._type];
  var typeBadge = {'MC':'badge-mc','TF':'badge-tf','SA':'badge-sa'}[q._type];
  document.getElementById('b-type').textContent = typeLabel;
  document.getElementById('b-type').className = 'badge ' + typeBadge;
  document.getElementById('b-chu').textContent = (q.s || CHU_LABEL[q.c] || q.c);
  document.getElementById('b-num').textContent = (cur+1) + ' / ' + pool.length;
  document.getElementById('qtext').textContent = q.q;
  var fill = Math.round((cur+1)/pool.length*100);
  document.getElementById('prog-fill').style.width = fill + '%';
  document.getElementById('prog-label').textContent = (cur+1) + ' / ' + pool.length;
  document.getElementById('btn-prev').style.display = cur>0?'':'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('nav-info').textContent = '';

  if(q._type==='MC') renderMC(q);
  else if(q._type==='TF') renderTF(q);
  else {
    renderSA(q);
    var st = answered[cur];
    if(st==='correct'){ document.getElementById('nav-info').textContent='✓ Đúng'; document.getElementById('btn-next').style.display=''; }
    else if(st==='wrong'){ document.getElementById('nav-info').textContent='✗ Sai'; document.getElementById('btn-next').style.display=''; }
  }
}

function renderMC(q){
  var body = document.getElementById('q-body');
  body.innerHTML = '';
  var keys = ['A','B','C','D'];
  var optDiv = document.createElement('div'); optDiv.className = 'opts';
  q.o.forEach(function(o,i){
    var btn = document.createElement('button'); btn.className = 'opt';
    btn.innerHTML = '<span class="opt-key">'+keys[i]+'.</span>'+o;
    if(answered[cur]!==null){
      btn.disabled = true;
      if(i===q.a) btn.classList.add('correct');
      else if(i===answered[cur]) btn.classList.add('wrong');
    } else {
      (function(idx){ btn.onclick = function(){ answerMC(idx); }; })(i);
    }
    optDiv.appendChild(btn);
  });
  body.appendChild(optDiv);
  if(answered[cur]!==null){
    document.getElementById('btn-next').style.display = '';
    document.getElementById('nav-info').textContent = answered[cur]===q.a?'✓ Đúng':'✗ Sai – Đáp án: '+keys[q.a];
  }
}

function answerMC(i){
  var q = pool[cur];
  answered[cur] = i;
  if(i===q.a){ correct++; document.getElementById('s-correct').textContent=correct; }
  else { wrong++; document.getElementById('s-wrong').textContent=wrong; }
  render();
}

function renderTF(q){
  var body = document.getElementById('q-body');
  body.innerHTML = '';
  var revealed = answered[cur]!==null;
  var userAnswers = revealed ? answered[cur] : (tfTemp.length===q.stmts.length?tfTemp:(function(){var a=[];for(var i=0;i<q.stmts.length;i++)a.push(null);return a;})());
  var grid = document.createElement('div'); grid.className = 'tf-opts';
  q.stmts.forEach(function(s,i){
    var card = document.createElement('div'); card.className = 'tf-item';
    var stmt = document.createElement('div'); stmt.className = 'tf-stmt';
    stmt.textContent = s.t;
    var btns = document.createElement('div'); btns.className = 'tf-btns';
    var tBtn = document.createElement('button'); tBtn.className='tf-btn t-btn'; tBtn.textContent='Đúng';
    var fBtn = document.createElement('button'); fBtn.className='tf-btn f-btn'; fBtn.textContent='Sai';
    if(revealed){
      tBtn.disabled=true; fBtn.disabled=true;
      if(s.a){ tBtn.classList.add('reveal-t'); } else { fBtn.classList.add('reveal-f'); }
      if(userAnswers[i]===true) tBtn.classList.add('selected-t');
      else if(userAnswers[i]===false) fBtn.classList.add('selected-f');
      var isOk = userAnswers[i]===s.a;
      var rrow = document.createElement('div'); rrow.className='tf-result-row';
      rrow.innerHTML='<span class="tf-check '+(isOk?'ok':'no')+'">'+(isOk?'✓ Đúng':'✗ Sai')+'</span>';
      card.appendChild(stmt); card.appendChild(btns); card.appendChild(rrow);
    } else {
      if(userAnswers[i]===true) tBtn.classList.add('selected-t');
      else if(userAnswers[i]===false) fBtn.classList.add('selected-f');
      (function(idx){ tBtn.onclick=function(){tfSelect(idx,true);}; fBtn.onclick=function(){tfSelect(idx,false);}; })(i);
      card.appendChild(stmt); card.appendChild(btns);
    }
    btns.appendChild(tBtn); btns.appendChild(fBtn);
    grid.appendChild(card);
  });
  body.appendChild(grid);
  if(!revealed){
    var allAnswered = tfTemp.length===q.stmts.length && tfTemp.every(function(a){return a!==null;});
    if(allAnswered && answered[cur]===null){
      var cfm = document.createElement('button'); cfm.className='btn primary'; cfm.textContent='Kiểm tra đáp án';
      cfm.style.cssText='width:100%;margin-top:8px';
      cfm.onclick = function(){ confirmTF(); };
      body.appendChild(cfm);
    }
  }
}

function tfSelect(i,val){
  var q = pool[cur];
  if(!tfTemp.length || tfTemp.length!==q.stmts.length){ tfTemp=[]; for(var j=0;j<q.stmts.length;j++) tfTemp.push(null); }
  tfTemp[i] = val;
  renderTF(q);
}

function confirmTF(){
  var q = pool[cur];
  answered[cur] = tfTemp.slice();
  tfTemp = [];
  var numCorrect = 0;
  q.stmts.forEach(function(s,i){ if(answered[cur][i]===s.a) numCorrect++; });
  if(numCorrect===q.stmts.length){ correct++; document.getElementById('s-correct').textContent=correct; document.getElementById('nav-info').textContent='✓ Đúng hết!'; }
  else if(numCorrect===0){ wrong++; document.getElementById('s-wrong').textContent=wrong; document.getElementById('nav-info').textContent='✗ Sai hết'; }
  else { document.getElementById('nav-info').textContent=numCorrect+'/'+q.stmts.length+' câu đúng'; }
  document.getElementById('btn-next').style.display = '';
  renderTF(q);
}

function extractNumber(str){
  var s = str.replace(/,/g,'.');
  var m = s.match(/-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/g);
  if(!m) return null;
  return parseFloat(m[m.length-1]);
}

function numbersMatch(userVal, ansVal){
  if(ansVal === 0) return Math.abs(userVal) < 0.01;
  return Math.abs((userVal - ansVal) / ansVal) <= 0.01;
}

function renderSA(q){
  var body = document.getElementById('q-body');
  body.innerHTML = '';
  var st = answered[cur];

  if(st==='correct' || st==='wrong'){
    var ans = document.createElement('div');
    ans.className = 'sa-answer ' + (st==='correct'?'correct-ans':'wrong-ans');
    var verdict = document.createElement('div');
    verdict.className = 'sa-verdict ' + (st==='correct'?'ok':'no');
    verdict.textContent = st==='correct' ? '✓ Bạn đã trả lời đúng!' : '✗ Bạn đã trả lời sai';
    var label = document.createElement('strong');
    label.textContent = 'Đáp án đúng';
    var aText = document.createTextNode(q.a);
    ans.appendChild(verdict); ans.appendChild(label); ans.appendChild(aText);
    body.appendChild(ans);
    document.getElementById('btn-next').style.display = '';
  } else {
    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:8px';
    hint.textContent = 'Nhập số vào ô bên dưới, nhấn Enter để kiểm tra tự động.';
    body.appendChild(hint);

    var wrap = document.createElement('div'); wrap.className='sa-input-wrap';
    wrap.style.alignItems = 'center';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'sa-input';
    inp.style.cssText = 'min-height:unset;height:44px;resize:none;font-size:16px';
    inp.placeholder = 'Nhập số...';
    inp.id = 'sa-inp';
    inp.onkeydown = function(e){ if((e.key||e.keyCode)==='Enter'||e.keyCode===13){ answerSA(); } };

    var sub = document.createElement('button');
    sub.className = 'sa-submit';
    sub.textContent = 'Kiểm tra';
    sub.onclick = function(){ answerSA(); };

    wrap.appendChild(inp); wrap.appendChild(sub);
    body.appendChild(wrap);

    var show = document.createElement('button');
    show.className = 'btn';
    show.textContent = 'Hiện đáp án';
    show.style.cssText = 'width:100%;margin-top:8px;font-size:12px';
    show.onclick = function(){
      var a2 = document.createElement('div'); a2.className='sa-answer shown-ans';
      var lb = document.createElement('strong'); lb.textContent = 'Đáp án đúng';
      var at = document.createTextNode(q.a);
      a2.appendChild(lb); a2.appendChild(at);
      body.innerHTML = '';
      body.appendChild(a2);
      answered[cur] = 'wrong';
      wrong++;
      document.getElementById('s-wrong').textContent = wrong;
      document.getElementById('nav-info').textContent = '✗ Đã xem đáp án';
      document.getElementById('btn-next').style.display = '';
    };
    body.appendChild(show);
    setTimeout(function(){ var el=document.getElementById('sa-inp'); if(el) el.focus(); }, 50);
  }
}

function answerSA(){
  var q = pool[cur];
  var inp = document.getElementById('sa-inp');
  if(!inp) return;
  var userStr = inp.value.replace(/^\s+|\s+$/g,'').replace(/,/g,'.');
  var userNum = parseFloat(userStr);
  if(isNaN(userNum)){
    inp.style.borderColor = '#e57373';
    inp.placeholder = 'Vui lòng nhập một số hợp lệ';
    return;
  }
  var ansNum = extractNumber(q.a);
  var isCorrect = (ansNum !== null) && numbersMatch(userNum, ansNum);
  if(isCorrect){
    correct++;
    document.getElementById('s-correct').textContent = correct;
    answered[cur] = 'correct';
  } else {
    wrong++;
    document.getElementById('s-wrong').textContent = wrong;
    answered[cur] = 'wrong';
  }
  document.getElementById('nav-info').textContent = isCorrect ? '✓ Đúng' : '✗ Sai';
  renderSA(q);
}

function go(d){
  if(d>0 && cur===pool.length-1){ showScore(); return; }
  cur = Math.max(0, Math.min(pool.length-1, cur+d));
  tfTemp = [];
  render();
}

function skipQ(){
  if(cur < pool.length-1){ cur++; tfTemp=[]; render(); }
}

function showScore(){
  var pct = Math.round(correct/Math.max(1,pool.length)*100);
  var emoji = pct>=80?'🏆 Xuất sắc!':pct>=60?'📘 Khá tốt!':'📚 Cần ôn thêm!';
  document.getElementById('qcard').innerHTML =
    '<div style="text-align:center;padding:28px 16px">' +
    '<div class="score-circle">' +
    '<div style="font-size:26px;font-weight:700;color:var(--blue)">'+pct+'%</div>' +
    '<div style="font-size:10px;color:var(--blue)">điểm số</div></div>' +
    '<div style="font-size:18px;font-weight:600;margin-bottom:8px">'+emoji+'</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:20px">Bạn đã hoàn thành '+pool.length+' câu hỏi</div>' +
    '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:22px">' +
    '<div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--green)">'+correct+'</div><div style="font-size:11px;color:var(--muted)">Đúng</div></div>' +
    '<div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--red)">'+wrong+'</div><div style="font-size:11px;color:var(--muted)">Sai</div></div>' +
    '<div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--blue)">'+(pool.length-correct-wrong)+'</div><div style="font-size:11px;color:var(--muted)">Bỏ qua</div></div>' +
    '</div>' +
    '<button class="btn primary" onclick="location.reload()">Làm lại</button>' +
    '</div>';
  document.getElementById('nav').style.display='none';
}

function toggleLog(){
  var panel = document.getElementById('log-panel');
  var arrow = document.getElementById('log-arrow');
  panel.classList.toggle('open');
  arrow.textContent = panel.classList.contains('open') ? '▲' : '▼';
}

(function(){
  var chuBtn = document.querySelector('#chu-tabs .tab:last-child');
  var typeBtn = document.querySelector('#type-tabs .ttab:last-child');
  setChu('ALL', chuBtn);
  setType('ALL', typeBtn);
})();

</script>
