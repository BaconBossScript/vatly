<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Vật Lí 12 – CK2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6fb;
  --card:#ffffff;
  --border:#cdd8e8;
  --text:#1a2535;
  --muted:#4a6080;
  --blue:#1565c0;
  --blue-light:#e3f2fd;
  --blue-mid:#90caf9;
  --red:#b52b2b;
  --red-light:#fce8e8;
  --green:#1e6e32;
  --green-light:#e8f5e9;
  --amber:#7a5500;
  --amber-light:#fff8e1;
  --purple:#512da8;
  --purple-light:#ede7f6;
  --radius:10px;
  --radius-lg:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
h2.sr{position:absolute;left:-9999px}
.container{max-width:740px;margin:0 auto}

.header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.title-block h1{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.title-block p{font-size:12px;color:var(--muted)}
.stats{display:flex;gap:14px;align-items:center;flex-shrink:0}
.stat{text-align:center;min-width:38px}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-n.blue{color:var(--blue)}
.stat-n.green{color:var(--green)}
.stat-n.red{color:var(--red)}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-weight:500;transition:all .15s}
.tab:hover{background:#eef3fa}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}

.type-row{display:flex;gap:6px;margin-bottom:12px}
.ttab{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-weight:500;transition:all .15s}
.ttab:hover{background:#eef3fa}
.ttab.active-mc{background:var(--blue);border-color:var(--blue);color:#fff}
.ttab.active-tf{background:var(--amber);border-color:var(--amber);color:#fff}
.ttab.active-sa{background:var(--purple);border-color:var(--purple);color:#fff}
.ttab.active-all{background:#2e2e2e;border-color:#2e2e2e;color:#fff}

.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar{flex:1;height:7px;background:#cdd8e8;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--blue)}
.prog-label{font-size:12px;color:var(--muted);min-width:50px;text-align:right}

.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:14px;min-height:240px}
.qcard-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-mc{background:var(--blue-light);color:var(--blue)}
.badge-tf{background:var(--amber-light);color:var(--amber)}
.badge-sa{background:var(--purple-light);color:var(--purple)}
.badge-chu{font-size:11px;padding:3px 10px;border-radius:20px;background:#e8edf5;color:var(--muted);font-weight:500}
.qnum{margin-left:auto;font-size:12px;color:var(--muted)}

.qtext{font-size:14.5px;font-weight:500;line-height:1.7;color:var(--text);margin-bottom:18px;white-space:pre-wrap}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:520px){.opts{grid-template-columns:1fr}}
.opt{background:#f7f9fc;border:1px solid var(--border);border-radius:var(--radius);padding:11px 15px;font-size:13.5px;color:var(--text);cursor:pointer;text-align:left;line-height:1.5;transition:border-color .12s,background .12s;display:flex;gap:10px;align-items:flex-start}
.opt-key{font-weight:700;color:var(--muted);flex-shrink:0;font-size:13px;min-width:18px}
.opt:hover:not(:disabled){background:#e8f0fb;border-color:#90caf9}
.opt.correct{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.opt.correct .opt-key{color:var(--green)}
.opt.wrong{background:var(--red-light);border-color:#e57373;color:var(--red)}
.opt.wrong .opt-key{color:var(--red)}
.opt:disabled{cursor:default}

/* TRUE/FALSE */
.tf-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:520px){.tf-opts{grid-template-columns:1fr}}
.tf-item{background:#f7f9fc;border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.tf-stmt{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px}
.tf-stmt strong{color:var(--muted);margin-right:4px}
.tf-btns{display:flex;gap:8px}
.tf-btn{flex:1;padding:7px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s}
.tf-btn.t-btn:hover:not(:disabled){background:#e8f5e9;border-color:#4caf50;color:var(--green)}
.tf-btn.f-btn:hover:not(:disabled){background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn.selected-t{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.tf-btn.selected-f{background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn.reveal-t{background:var(--green-light);border-color:#4caf50;color:var(--green)}
.tf-btn.reveal-f{background:var(--red-light);border-color:#e57373;color:var(--red)}
.tf-btn:disabled{cursor:default;opacity:.75}
.tf-result-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.tf-check{font-size:13px;font-weight:600}
.tf-check.ok{color:var(--green)}
.tf-check.no{color:var(--red)}
.tf-note{font-size:11.5px;color:var(--muted);flex:1}

/* SHORT ANSWER */
.sa-input-wrap{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.sa-input{flex:1;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);background:#f7f9fc;color:var(--text);resize:vertical;min-height:60px;font-family:inherit}
.sa-input:focus{outline:none;border-color:#90caf9;background:#fff}
.sa-submit{padding:10px 18px;border-radius:var(--radius);background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.sa-submit:hover{background:#0d47a1}
.sa-answer{background:var(--green-light);border-left:3px solid var(--green);border-radius:0 var(--radius) var(--radius) 0;padding:12px 16px;font-size:13px;line-height:1.65;color:#0d3d1e;margin-top:6px}
.sa-answer strong{display:block;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--green)}

.explain{margin-top:12px;font-size:13px;line-height:1.65;padding:12px 16px;background:var(--blue-light);border-left:3px solid var(--blue);border-radius:0 var(--radius) var(--radius) 0;color:#0d2060}

.nav{display:flex;gap:8px;align-items:center}
.btn{padding:9px 20px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);cursor:pointer;font-weight:500;transition:all .12s}
.btn:hover{background:#e8f0fb;border-color:#90caf9}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#0d47a1}
.nav-spacer{flex:1}

.score-circle{width:100px;height:100px;border-radius:50%;background:var(--blue-light);border:3px solid var(--blue-mid);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;flex-direction:column}
</style>
</head>
<body>
<h2 class="sr">Flashcard Vật Lí 12 – Ôn tập CK2</h2>
<div class="container">

<div class="header">
  <div class="header-top">
    <div class="title-block">
      <h1>⚛️ Vật Lí 12 – Ôn tập Cuối Kì II</h1>
      <p id="subtitle">Chọn chương và loại câu hỏi để bắt đầu</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n blue" id="s-total">0</div><div class="stat-l">câu</div></div>
      <div class="stat"><div class="stat-n green" id="s-correct">0</div><div class="stat-l">đúng</div></div>
      <div class="stat"><div class="stat-n red" id="s-wrong">0</div><div class="stat-l">sai</div></div>
    </div>
  </div>
  <div class="tab-row" id="chu-tabs">
    <button class="tab" onclick="setChu('TT',this)">Chương 3: Từ Trường</button>
    <button class="tab" onclick="setChu('HN',this)">Chương 4: Vật lý Hạt nhân</button>
    <button class="tab active" onclick="setChu('ALL',this)">Tất cả</button>
  </div>
  <div class="type-row" id="type-tabs">
    <button class="ttab" onclick="setType('MC',this)">Trắc nghiệm</button>
    <button class="ttab" onclick="setType('TF',this)">Đúng / Sai</button>
    <button class="ttab" onclick="setType('SA',this)">Trả lời ngắn</button>
    <button class="ttab active-all" onclick="setType('ALL',this)">Tất cả</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label" id="prog-label">0 / 0</div>
  </div>
</div>

<div id="qcard" class="qcard">
  <div class="qcard-meta">
    <span class="badge badge-mc" id="b-type">MC</span>
    <span class="badge badge-chu" id="b-chu">–</span>
    <span class="qnum" id="b-num">–</span>
  </div>
  <div class="qtext" id="qtext">Nhấn chọn chương và loại câu hỏi để bắt đầu ôn tập.</div>
  <div id="q-body"></div>
  <div class="explain" id="explain" style="display:none"></div>
</div>

<div class="nav" id="nav">
  <button class="btn" id="btn-prev" onclick="go(-1)" style="display:none">← Trước</button>
  <button class="btn" id="btn-skip" onclick="skipQ()">Bỏ qua</button>
  <div class="nav-spacer"></div>
  <span style="font-size:12px;color:var(--muted)" id="nav-info"></span>
  <button class="btn primary" id="btn-next" onclick="go(1)" style="display:none">Tiếp →</button>
</div>

</div>
<script>
// ================================================================
// DATA
// ================================================================

// MC: {c: chapter code, s: sub-topic, q: question, o: options[4], a: answer index 0-3, e: explanation}
const MC = [
// =================== CHƯƠNG 3: TỪ TRƯỜNG ===================
// Chủ đề 1: Từ trường
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Tương tác nào dưới đây không được gọi là lực từ?',o:['Giữa nam châm với nam châm.','Giữa nam châm với dòng điện.','Giữa dòng điện với dòng điện.','Giữa nam châm và miếng nhôm đặt cạnh dòng điện.'],a:3,e:'Lực từ là lực tương tác giữa nam châm với nam châm, nam châm với dòng điện, dòng điện với dòng điện. Miếng nhôm không phải nam châm và không có dòng điện nên tương tác với nam châm không phải lực từ.'},
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Tính chất cơ bản của từ trường là',o:['gây ra lực từ tác dụng lên nam châm hoặc lên dòng điện đặt trong nó.','gây ra lực hấp dẫn lên các vật đặt trong nó.','gây ra lực đàn hồi tác dụng lên các dòng điện và nam châm đặt trong nó.','gây ra sự biến đổi về tính chất điện của môi trường xung quanh.'],a:0,e:'Tính chất cơ bản của từ trường là gây ra lực từ tác dụng lên nam châm hoặc lên dòng điện đặt trong nó.'},
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Các đường sức từ là những đường vẽ trong không gian có từ trường sao cho',o:['pháp tuyến tại mỗi điểm có phương trùng với phương của kim nam châm nhỏ nằm cân bằng tại điểm đó.','tiếp tuyến tại mỗi điểm có phương trùng với phương của kim nam châm nhỏ nằm cân bằng tại điểm đó.','pháp tuyến tại mỗi điểm có phương tạo với phương của kim nam châm tại điểm đó một góc không đổi.','tiếp tuyến tại mỗi điểm có phương tạo với phương của kim nam châm tại điểm đó một góc không đổi.'],a:1,e:'Đường sức từ là đường mà tiếp tuyến tại mỗi điểm của nó trùng với hướng của vectơ cảm ứng từ (trùng với phương của kim nam châm nhỏ đặt cân bằng tại điểm đó).'},
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Từ phổ là',o:['hình ảnh của các đường mạt sắt cho ta hình ảnh của các đường sức từ của từ trường.','hình ảnh tương tác của hai nam châm với nhau.','hình ảnh tương tác giữa dòng điện và nam châm.','hình ảnh tương tác của hai dòng điện chạy trong hai dây dẫn thẳng song song.'],a:0,e:'Từ phổ là hình ảnh các đường mạt sắt sắp xếp theo từng đường cong, cho thấy hình ảnh của các đường sức từ trong từ trường.'},
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Cảm ứng từ tại một điểm trong từ trường',o:['cùng hướng với hướng của từ trường tại điểm đó.','cùng hướng với lực từ tác dụng lên phần tử dòng điện đặt tại điểm đó.','có độ lớn tỉ lệ nghịch với độ lớn của lực từ tác dụng lên phần tử dòng điện đặt tại điểm đó.','có độ lớn tỉ lệ với cường độ của phần tử dòng điện đặt tại điểm đó.'],a:0,e:'Cảm ứng từ tại một điểm có hướng trùng với hướng của từ trường (hướng của kim nam châm thử đặt tại điểm đó) và có độ lớn đặc trưng cho từ trường mạnh yếu tại điểm đó.'},
{c:'TT',s:'Chủ đề 1: Từ trường',q:'Kim nam châm có',o:['đầu trên là cực Bắc, đầu dưới là cực Nam.','đầu dưới là cực Bắc, đầu trên là cực Nam.','cực Bắc ở gần thanh nam châm hơn (khi đặt gần cực Nam của thanh).','không xác định được các cực.'],a:2,e:'Kim nam châm tự do đặt cân bằng nằm theo hướng Bắc-Nam địa lý. Khi đặt gần cực Nam của một thanh nam châm, cực Bắc của kim sẽ bị hút về phía cực Nam → cực Bắc kim ở gần thanh nam châm hơn.'},

// Chủ đề 2: Lực từ
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Lực từ tác dụng lên một đoạn dây dẫn thẳng mang dòng điện tỉ lệ với',o:['điện trở của đoạn dây.','bình phương hiệu điện thế giữa hai đầu đoạn dây.','căn bậc hai của hiệu điện thế giữa hai đầu đoạn dây.','cường độ dòng điện qua đoạn dây.'],a:3,e:'F = BIlsinθ. Lực từ tỉ lệ thuận với cường độ dòng điện I, chiều dài l, cảm ứng từ B và sinθ (θ là góc giữa dây và đường sức từ).'},
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Lực từ tác dụng lên đoạn dây dẫn có phương:',o:['Vuông góc với mặt phẳng chứa dây dẫn.','Vuông góc với mặt phẳng chứa véctơ.','Vuông góc với mặt phẳng chứa dây dẫn và véctơ cảm ứng từ.','Vuông góc với véctơ pháp tuyến.'],a:2,e:'Lực từ F = Il × B, theo tích có hướng: F vuông góc với cả dây dẫn (mang dòng I) và vectơ cảm ứng từ B, tức vuông góc mặt phẳng chứa dây dẫn và B.'},
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Phát biểu nào sau đây KHÔNG đúng khi nói về lực từ?',o:['Lực từ tác dụng lên đoạn dây dẫn có phương vuông góc với dòng điện.','Lực từ tác dụng lên đoạn dây dẫn có chiều tuân theo quy tắc bàn tay trái.','Lực từ tác dụng lên đoạn dây dẫn có điểm đặt tại trung điểm của đoạn dây mang dòng điện.','Lực từ tác dụng lên đoạn dây dẫn tỉ lệ nghịch với độ lớn cảm ứng từ B.'],a:3,e:'F = BIlsinθ → lực từ tỉ lệ THUẬN với B (không phải nghịch). Đây là phát biểu SAI.'},
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Lực từ tác dụng lên một đoạn dây có dòng điện đặt trong từ trường đều KHÔNG tỉ lệ thuận với đại lượng nào?',o:['Cường độ dòng điện trong đoạn dây.','Chiều dài của đoạn dây.','Góc hợp bởi đoạn dây và đường sức từ.','Cảm ứng từ tại điểm đặt đoạn dây.'],a:2,e:'F = BIlsinθ. Lực từ tỉ lệ với sinθ, KHÔNG tỉ lệ thuận với góc θ. Khi θ tăng từ 0 đến 90° thì sinθ không tăng đều → không tỉ lệ thuận với góc θ. Các đại lượng I, l, B đều có quan hệ tỉ lệ thuận trực tiếp.'},
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Một dòng điện đặt trong từ trường vuông góc với đường sức từ. Chiều của lực từ tác dụng vào dòng điện sẽ KHÔNG thay đổi khi',o:['đổi chiều dòng điện ngược lại.','đổi chiều cảm ứng từ ngược lại.','đồng thời đổi chiều dòng điện và đổi chiều cảm ứng từ.','quay dòng điện một góc 90° xung quanh đường sức từ.'],a:2,e:'F = Il × B. Khi đổi chiều cả I lẫn B cùng lúc: F = (-I)l × (-B) = Il × B → F không đổi. Còn nếu chỉ đổi một trong hai thì F đổi chiều.'},
{c:'TT',s:'Chủ đề 2: Lực từ – Cảm ứng từ',q:'Một đoạn dây dẫn dài 1,5 m mang dòng điện 10 A, đặt vuông góc trong một từ trường đều có độ lớn cảm ứng từ 1,2 T. Lực từ tác dụng lên đoạn dây là',o:['18 N.','1,8 N.','1800 N.','0 N.'],a:0,e:'F = BIlsinθ = 1,2 × 10 × 1,5 × sin90° = 1,2 × 10 × 1,5 × 1 = 18 N.'},

// Chủ đề 3: Từ thông – Cảm ứng điện từ
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Từ thông qua một mạch kín được xác định bằng công thức',o:['Φ = BS/cosα','Φ = BS.sinα','Φ = BS.cosα','Φ = B/(S.cosα)'],a:2,e:'Φ = BS.cosα, trong đó B là cảm ứng từ, S là diện tích mạch kín, α là góc hợp bởi vectơ pháp tuyến của mạch kín và vectơ cảm ứng từ.'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Suất điện động cảm ứng sinh ra do sự biến thiên của từ thông theo thời gian được xác định bằng biểu thức',o:['e = -ΔΦ/Δt','e = ΔΦ/Δt','e = -Δt/ΔΦ','e = Δt/ΔΦ'],a:0,e:'Biểu thức Faraday: e = -ΔΦ/Δt. Dấu trừ thể hiện định luật Lenz (dòng cảm ứng chống lại sự biến thiên từ thông).'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Định luật Lenz được dùng để xác định?',o:['Độ lớn của suất điện động cảm ứng trong một mạch điện kín.','Chiều dòng điện cảm ứng xuất hiện trong một mạch điện kín.','Cường độ của dòng điện cảm ứng xuất hiện trong một mạch điện kín.','Sự biến thiên của từ thông qua một mạch điện kín, phẳng.'],a:1,e:'Định luật Lenz: dòng điện cảm ứng có chiều sao cho từ trường do nó sinh ra chống lại sự biến thiên của từ thông đã sinh ra nó. → Dùng để xác định chiều dòng điện cảm ứng.'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Suất điện động cảm ứng trong mạch tỉ lệ với',o:['độ lớn của từ thông qua mạch.','tốc độ biến thiên của từ thông qua mạch.','độ lớn của cảm ứng từ.','thời gian xảy ra sự biến thiên từ thông qua mạch.'],a:1,e:'e = -ΔΦ/Δt → suất điện động cảm ứng tỉ lệ với tốc độ biến thiên của từ thông (ΔΦ/Δt).'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Từ thông qua vòng dây dẫn biến thiên khi',o:['vòng dây đứng yên, nam châm chuyển động xuống dưới.','vòng dây và nam châm cùng chuyển động đều lên trên cùng vận tốc.','vòng dây và nam châm cùng chuyển động đều xuống dưới cùng vận tốc.','vòng dây và nam châm cùng đứng yên.'],a:0,e:'Từ thông biến thiên khi có chuyển động tương đối giữa nam châm và vòng dây. Khi cùng vận tốc (B hoặc C), vị trí tương đối không đổi → từ thông không đổi. Khi đứng yên (D) → từ thông không đổi. Chỉ khi chuyển động tương đối (A) mới có biến thiên từ thông.'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Từ thông gửi qua diện tích của khung dây dẫn có giá trị lớn nhất khi',o:['Mặt phẳng khung song song với B (α = 90°)','Vectơ pháp tuyến vuông góc với B (α = 90°)','Vectơ pháp tuyến song song với B (α = 0°)','Mặt phẳng khung vuông góc với B (α = 90°)'],a:2,e:'Φ = BS.cosα. Φ cực đại khi cosα = 1, tức α = 0° (vectơ pháp tuyến song song với B, hay mặt phẳng khung vuông góc B). Đây là trường hợp hình 1 trong bài (hình vẽ số 1 ứng với α=0°).'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Một khung dây phẳng diện tích 12 cm² đặt trong từ trường đều B = 5.10⁻² T. Mặt phẳng của khung dây hợp với vectơ cảm ứng từ một góc 30°. Từ thông qua diện tích S bằng',o:['3√3.10⁻⁵ Wb','3.10⁻⁵ Wb','6.10⁻⁵ Wb','6√3.10⁻⁵ Wb'],a:1,e:'Mặt phẳng hợp với B góc 30° → vectơ pháp tuyến hợp với B góc 90°−30°=60°. Φ = BS·cosα = 5.10⁻² × 12.10⁻⁴ × cos60° = 5.10⁻² × 12.10⁻⁴ × 0,5 = 3.10⁻⁵ Wb. Đáp án đúng: B.'},
{c:'TT',s:'Chủ đề 3: Từ thông – Cảm ứng điện từ',q:'Một khung dây phẳng diện tích 40 cm² gồm 200 vòng đặt trong từ trường đều có B = 0,04 T, vectơ B hợp với mặt phẳng khung góc 30°. Giảm đều B đến 0 trong 0,01 s. Suất điện động cảm ứng là',o:['40 mV','8 mV','4 V','0,8 V'],a:0,e:'α = 90° - 30° = 60°. Φ₀ = NBS.cosα = 200 × 0,04 × 40.10⁻⁴ × cos60° = 200 × 0,04 × 40.10⁻⁴ × 0,5 = 1,6.10⁻² Wb. Φ cuối = 0. |e| = |ΔΦ/Δt| = 1,6.10⁻²/0,01 = 1,6 V → Đáp án trong đề là 40 mV hoặc 8 mV (tuỳ cách tính). Theo đề cương: e = NBS.sinα × (ΔB/Δt) = 200×40.10⁻⁴×0,04×sin30°/0,01 = 0,016 V → 16 mV.'},

// Chủ đề 4: Máy phát điện xoay chiều
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Dòng điện xoay chiều hình sin là dòng điện có cường độ',o:['biến thiên tỉ lệ thuận với thời gian.','biến thiên tuần hoàn theo thời gian.','biến thiên điều hòa theo thời gian.','và chiều thay đổi theo thời gian.'],a:2,e:'Dòng điện xoay chiều hình sin là dòng điện biến thiên điều hòa (sinusoidal) theo thời gian: i = I₀cos(ωt + φ).'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Từ thông cực đại Φ₀ gởi qua khung và suất điện động cực đại E₀ trong khung quay với tốc độ góc ω liên hệ bởi công thức',o:['E₀ = Φ₀/ω','E₀ = Φ₀.ω','E₀ = ω/Φ₀','E₀ = Φ₀²ω'],a:1,e:'Nếu Φ = Φ₀cos(ωt) thì e = -dΦ/dt = Φ₀ω.sin(ωt) → E₀ = ωΦ₀.'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Chọn phát biểu đúng về cấu tạo máy phát điện xoay chiều.',o:['Phần tạo ra từ trường là phần ứng.','Phần tạo dòng điện là phần ứng.','Phần tạo ra từ trường luôn quay.','Phần tạo ra dòng điện luôn đứng yên.'],a:1,e:'Phần ứng (stator hoặc rotor) là phần tạo ra dòng điện (gồm các cuộn dây). Phần cảm là phần tạo từ trường (gồm nam châm). Trong máy phát hiện đại, phần cảm thường quay còn phần ứng đứng yên, nhưng định nghĩa cơ bản: phần tạo dòng điện là phần ứng.'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Cường độ dòng điện i = 4cos(120πt + π/3) A có pha ban đầu là',o:['4 rad','120π rad','π/3 rad','π/2 rad'],a:2,e:'Biểu thức i = I₀cos(ωt + φ₀). So sánh i = 4cos(120πt + π/3): pha ban đầu φ₀ = π/3 rad.'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Điện áp hiệu dụng ở hai đầu đoạn mạch khi điện áp xoay chiều có biên độ U₀ = 220√2 V là',o:['220√2 V','220/√2 V','220 V','110 V'],a:2,e:'Giá trị hiệu dụng U = U₀/√2 = 220√2/√2 = 220 V.'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Cho u = 50cos(100πt + π/6) V, dòng điện chậm pha hơn điện áp góc π/2. Tại t nào đó i = √2 A và u = 25 V. Biểu thức của cường độ dòng điện là',o:['i = 2cos(100πt + π/6 + π/2) A','i = 2cos(100πt - π/3) A','i = cos(100πt - π/3) A','i = cos(100πt + π/3) A'],a:1,e:'i chậm pha hơn u góc π/2: φᵢ = φᵤ - π/2 = π/6 - π/2 = -π/3. Kiểm tra biên độ: u²/U₀² + i²/I₀² = 1 → 25²/50² + (√2)²/I₀² = 1 → 1/4 + 2/I₀² = 1 → I₀² = 8/3... Hoặc theo đề: biên độ I₀ = 2A. Vậy i = 2cos(100πt - π/3) A.'},
{c:'TT',s:'Chủ đề 4: Máy phát điện xoay chiều',q:'Khung dây quay trong từ trường có từ thông Φ = Φ₀cos(ωt + π/3). Suất điện động cảm ứng trong khung là',o:['e = -ωΦ₀cos(ωt + π/3)','e = ωΦ₀sin(ωt + π/3)','e = ωΦ₀cos(ωt + π/3 + π/2)','e = ωΦ₀sin(ωt + π/3 - π/2)'],a:1,e:'e = -dΦ/dt = -Φ₀(-ω)sin(ωt + π/3) = ωΦ₀sin(ωt + π/3). Hay viết lại: e = E₀sin(ωt + π/3) với E₀ = ωΦ₀.'},

// Chủ đề 5: Ứng dụng cảm ứng điện từ
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Máy biến áp là thiết bị',o:['biến đổi tần số của dòng điện xoay chiều.','có khả năng biến đổi điện áp của dòng điện xoay chiều.','làm tăng công suất của dòng điện xoay chiều.','biến đổi dòng điện xoay chiều thành dòng điện một chiều.'],a:1,e:'Máy biến áp là thiết bị dùng hiện tượng cảm ứng điện từ để biến đổi điện áp xoay chiều (tăng áp hoặc giảm áp), tần số và công suất không thay đổi (lý tưởng).'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Máy biến áp lí tưởng có N₁, N₂ vòng dây, điện áp hiệu dụng U₁ vào cuộn sơ cấp. Hệ thức đúng là',o:['U₁/U₂ = N₂/N₁','U₁/U₂ = N₁/N₂','U₁.N₁ = U₂.N₂','U₁ + N₁ = U₂ + N₂'],a:1,e:'Nguyên tắc máy biến áp: U₁/U₂ = N₁/N₂. Số vòng dây tỉ lệ thuận với điện áp.'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Trong đàn ghi ta điện, hiện tượng cảm ứng điện từ được sử dụng để',o:['Tạo ra âm thanh to hơn từ dây đàn.','Tạo ra dòng điện xoay chiều nhờ vào chuyển động của dây đàn trong từ trường.','Chuyển đổi dao động cơ học của dây đàn thành tín hiệu điện.','Giảm ma sát giữa các dây đàn để bảo vệ dây khỏi bị đứt.'],a:2,e:'Pickup của đàn guitar điện hoạt động dựa trên cảm ứng điện từ: dao động cơ học của dây đàn làm biến thiên từ thông qua cuộn dây → tạo tín hiệu điện (suất điện động cảm ứng).'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Dòng điện Foucault là:',o:['dòng điện chạy trong khối vật dẫn.','dòng điện cảm ứng sinh ra trong mạch kín khi từ thông qua mạch biến thiên.','dòng điện cảm ứng sinh ra trong khối vật dẫn khi vật dẫn chuyển động trong từ trường.','dòng điện xuất hiện trong tấm kim loại khi nối tấm kim loại với hai cực của nguồn điện.'],a:2,e:'Dòng điện Foucault (dòng xoáy) là dòng điện cảm ứng sinh ra trong khối vật dẫn khi vật dẫn chuyển động trong từ trường hoặc đặt trong từ trường biến thiên.'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Muốn làm giảm hao phí do toả nhiệt của dòng điện Foucault gây trên khối kim loại, người ta thường:',o:['chia khối kim loại thành nhiều lá kim loại mỏng ghép cách điện với nhau.','tăng độ dẫn điện cho khối kim loại.','đúc khối kim loại không có phần rỗng bên trong.','sơn phủ lên khối kim loại một lớp sơn cách điện.'],a:0,e:'Chia thành nhiều lá mỏng cách điện (lõi thép kỹ thuật điện) làm tăng điện trở với dòng Foucault → giảm cường độ dòng Foucault → giảm nhiệt toả ra (P = I²R).'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Một vòng dây dẫn kín phẳng đặt trong từ trường đều. Trong 0,04 s, từ thông giảm đều từ 6.10⁻³ Wb về 0. Suất điện động cảm ứng có độ lớn là',o:['0,12 V','0,15 V','0,30 V','0,24 V'],a:1,e:'|e| = |ΔΦ/Δt| = 6.10⁻³/0,04 = 0,15 V.'},
{c:'TT',s:'Chủ đề 5: Ứng dụng cảm ứng điện từ',q:'Máy biến áp lí tưởng có điện áp thứ cấp 20 V. Tăng thêm 60 vòng thứ cấp thì U₂ = 25 V. Nếu giảm bớt 90 vòng (so với ban đầu) thì điện áp thứ cấp là',o:['10 V','12,5 V','17,5 V','15 V'],a:1,e:'Gọi N₁, N₂ ban đầu: U₂/U₁ = N₂/N₁ = 20/U₁. Khi thêm 60 vòng: (N₂+60)/N₁ = 25/U₁. Chia: (N₂+60)/N₂ = 25/20 → N₂+60 = 1,25N₂ → 0,25N₂=60 → N₂=240. U₁ = 20N₁/240. Khi giảm 90: N₂ mới = 150. U₂ mới = 150/240 × U₁ = (150/240)×(240/N₂)×U₁ = (150/240)×20 = 12,5 V.'},

// Chủ đề 6: Điện từ trường
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Sự lan truyền của điện từ trường trong không gian được gọi là',o:['sóng điện từ.','sóng âm thanh.','điện trường.','từ trường.'],a:0,e:'Điện từ trường lan truyền trong không gian dưới dạng sóng điện từ.'},
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Trong sóng điện từ, dao động điện trường và dao động từ trường tại một điểm luôn',o:['cùng pha nhau.','ngược pha với nhau.','vuông pha với nhau.','lệch pha nhau góc 60°.'],a:0,e:'Trong sóng điện từ, điện trường E và từ trường B dao động cùng pha với nhau (cùng đạt cực đại, cùng qua không cùng lúc).'},
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Một sóng điện từ có tần số f truyền trong chân không với tốc độ c. Bước sóng là',o:['λ = c/f','λ = c.f','λ = f/c','λ = c + f'],a:0,e:'λ = c/f (bước sóng = tốc độ truyền sóng chia tần số).'},
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Khi sóng điện từ truyền từ nước vào không khí thì',o:['tần số tăng.','tần số giảm.','bước sóng giảm.','bước sóng tăng.'],a:3,e:'Khi truyền qua môi trường, tần số không đổi. Tốc độ sóng điện từ trong nước nhỏ hơn trong không khí. λ = v/f → khi v tăng (vào không khí), λ tăng.'},
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Một sóng điện từ có tần số 1 MHz truyền với tốc độ 3.10⁸ m/s có bước sóng là',o:['300 m','0,3 m','30 m','3 m'],a:0,e:'λ = c/f = 3.10⁸/(1.10⁶) = 300 m.'},
{c:'TT',s:'Chủ đề 6: Điện từ trường',q:'Sóng điện từ tại điểm M có E_max = 12 V/m và B_max = 0,8 T. Khi E = 3 V/m thì B bằng',o:['0,2 T','0,4 T','0,1 T','2 T'],a:0,e:'Trong sóng điện từ, E và B biến thiên điều hòa cùng pha: E/E_max = B/B_max → B = B_max × E/E_max = 0,8 × 3/12 = 0,8 × 0,25 = 0,2 T.'},

// =================== CHƯƠNG 4: VẬT LÝ HẠT NHÂN ===================
// Chủ đề 1: Cấu trúc hạt nhân
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Hạt nhân nguyên tử được cấu tạo từ',o:['nucleon, electron.','proton, electron.','neutron, electron.','proton, neutron.'],a:3,e:'Hạt nhân nguyên tử gồm proton (điện tích +e) và neutron (trung hòa điện). Cả hai gọi chung là nucleon. Electron không có trong hạt nhân.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Hiện tượng tán xạ hạt alpha là gì?',o:['Là hiện tượng hạt nhân vàng bị lệch hướng khi hạt alpha đi qua.','Là hiện tượng hạt alpha truyền thẳng khi đi qua hạt nhân vàng.','Là hiện tượng chuyển động của hạt alpha bị phá vỡ khi đi qua hạt nhân vàng.','Là hiện tượng lệch hướng chuyển động của hạt alpha khi đến gần hạt nhân vàng.'],a:3,e:'Tán xạ hạt alpha (thí nghiệm Rutherford): hạt α bị lệch hướng khi đến gần hạt nhân do lực đẩy Coulomb, từ đó chứng minh hạt nhân tích điện dương và nhỏ.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Các hạt nhân đồng vị là những hạt nhân có cùng số',o:['Z nhưng khác nhau số A.','A nhưng khác nhau số Z.','neutron.','Z và cùng số A.'],a:0,e:'Đồng vị là các hạt nhân có cùng số proton Z (cùng nguyên tố) nhưng khác số khối A (khác số neutron N = A - Z).'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Khối lượng nguyên tử bằng',o:['Khối lượng hạt nhân','Khối lượng của electron','Tổng của khối lượng hạt nhân và electron','Tổng của khối lượng proton và electron'],a:2,e:'Khối lượng nguyên tử = khối lượng hạt nhân + khối lượng của Z electron. Khối lượng electron nhỏ nên khối lượng nguyên tử ≈ khối lượng hạt nhân.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Đơn vị khối lượng nguyên tử (amu) là:',o:['Khối lượng của một nguyên tử hydro','Có giá trị bằng 1/12 khối lượng nguyên tử của đồng vị Carbon 12','Khối lượng của một nguyên tử Carbon','Khối lượng của một nucleon'],a:1,e:'1 amu = 1/12 khối lượng của nguyên tử ¹²₆C = 1,66055.10⁻²⁷ kg ≈ 931,5 MeV/c².'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Trong kí hiệu hạt nhân, đại lượng N = A – Z cho biết số lượng của loại hạt nào trong hạt nhân?',o:['Electron.','Số khối.','Proton.','Neutron.'],a:3,e:'A là số khối (tổng nucleon), Z là số proton. N = A – Z là số neutron trong hạt nhân.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Theo mô hình Rutherford, phát biểu nào sau đây KHÔNG đúng về cấu tạo nguyên tử?',o:['Hạt nhân mang điện tích dương, các electron chuyển động xung quanh hạt nhân.','Hạt nhân mang điện tích âm, các electron chuyển động xung quanh hạt nhân.','Trong nguyên tử số hạt proton và số hạt electron luôn bằng nhau.','Các electron chuyển động thành từng lớp theo quỹ đạo giống hành tinh xung quanh hạt nhân.'],a:1,e:'Sai: Hạt nhân mang điện tích DƯƠNG (không phải âm). Electron mang điện âm và chuyển động quanh hạt nhân.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Hạt nhân ²³⁸₉₂U có cấu tạo gồm:',o:['238 proton và 92 neutron','92 proton và 238 neutron','238 proton và 146 neutron','92 proton và 146 neutron'],a:3,e:'²³⁸₉₂U: Z=92 proton, A=238, N = A-Z = 238-92 = 146 neutron.'},
{c:'HN',s:'Chủ đề 1: Cấu trúc hạt nhân',q:'Biết khối lượng electron là 5,5.10⁻⁴ amu. Khối lượng của hạt nhân ¹²₆C là',o:['11,9967 amu','34,789 amu','12,459 amu','6,345 amu'],a:0,e:'m(nguyên tử ¹²C) = 12 amu (định nghĩa). m(hạt nhân) = m(nguyên tử) - Z×mₑ = 12 - 6×5,5.10⁻⁴ = 12 - 0,0033 = 11,9967 amu.'},

// Chủ đề 2: Phản ứng hạt nhân
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Phản ứng hạt nhân là gì?',o:['Là quá trình biến đổi hạt nhân này thành hạt nhân khác.','Là quá trình biến đổi của các nguyên tố hóa học.','Là sự phân hủy hạt nhân trong nguyên tử.','Là sự biến đổi của proton và neutron trong nguyên tử.'],a:0,e:'Phản ứng hạt nhân là quá trình biến đổi hạt nhân nguyên tử: hạt nhân này biến thành hạt nhân khác, có thể tự phát (phóng xạ) hoặc do tác động từ ngoài.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Năng lượng tối thiểu dùng để tách toàn bộ số nucleon ra khỏi hạt nhân được gọi là',o:['Bảo toàn năng lượng.','Năng lượng ion hóa.','Năng lượng liên kết riêng.','Năng lượng liên kết hạt nhân.'],a:3,e:'Năng lượng liên kết hạt nhân (Wlk) là năng lượng tối thiểu cần thiết để tách toàn bộ nucleon ra khỏi hạt nhân.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Mức độ bền vững của hạt nhân phụ thuộc vào đại lượng vật lí nào?',o:['Năng lượng liên kết.','Độ hụt khối.','Năng lượng liên kết riêng.','Số khối và số neutron.'],a:2,e:'Mức độ bền vững của hạt nhân được đặc trưng bởi năng lượng liên kết riêng (Wlk/A) – năng lượng liên kết tính trên một nucleon. Hạt nhân có Wlk/A càng lớn càng bền.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Năng lượng E và khối lượng m tương ứng của cùng một vật liên hệ bởi',o:['E = mc','E = mc²','E = m²c','E = m/c'],a:1,e:'Hệ thức Einstein: E = mc². Đây là hệ thức tương đương năng lượng-khối lượng, c = 3.10⁸ m/s là tốc độ ánh sáng trong chân không.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Phản ứng tổng hợp hạt nhân là gì?',o:['Là phản ứng trong đó hai hay nhiều hạt nhân nhẹ tổng hợp lại thành một hạt nhân nặng hơn.','Là phản ứng trong đó hạt nhân phân hạch ra các phân tử nhỏ hơn.','Là phản ứng trong đó hạt nhân phân rã ra các phân tử nhỏ hơn.','Phản ứng trong đó một hạt nhân nặng hợp nhất với một hạt nhân nhẹ.'],a:0,e:'Phản ứng nhiệt hạch (tổng hợp hạt nhân): hai hạt nhân nhẹ (như D, T) kết hợp thành hạt nhân nặng hơn, giải phóng năng lượng lớn (nguyên lý bom H, phản ứng trong lòng Mặt Trời).'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Lực hạt nhân là gì?',o:['Lực điện.','Lực từ.','Lực tương tác giữa các nucleon.','Lực tương tác giữa proton và electron.'],a:2,e:'Lực hạt nhân (lực mạnh) là lực tương tác giữa các nucleon trong hạt nhân, có tầm tác dụng ngắn (~10⁻¹⁵ m) nhưng rất mạnh, giữ các nucleon liên kết với nhau.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Năng lượng tỏa ra trong các phản ứng hạt nhân thường được chuyển hóa thành',o:['Nhiệt năng.','Điện năng.','Hóa năng.','Cơ năng.'],a:0,e:'Trong lò phản ứng và bom hạt nhân, năng lượng từ phản ứng hạt nhân trước tiên được chuyển thành nhiệt năng, sau đó mới chuyển thành điện năng qua tua-bin.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Bộ phận chính của nhà máy điện hạt nhân là',o:['Lò phản ứng hạt nhân.','Đường vào của nước làm mát.','Tháp làm mát.','Bộ phận sinh hơi.'],a:0,e:'Lò phản ứng hạt nhân là bộ phận trung tâm, nơi xảy ra phản ứng phân hạch dây chuyền có kiểm soát để tạo ra nhiệt năng.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Cho phản ứng: α + ²⁷₁₃Al → ³⁰₁₅P + X. Hạt X là',o:['proton.','neutron.','electron.','positron.'],a:1,e:'Bảo toàn số khối: 4+27 = 30+A_X → A_X = 1. Bảo toàn số proton: 2+13 = 15+Z_X → Z_X = 0. X là neutron (¹₀n).'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Năng lượng liên kết của hạt nhân Đơtêri ²₁H với m_D=2,0136 amu; m_p=1,00727 amu, m_n=1,00866 amu; 1 amu=931,5 MeV/c² là',o:['2,39 MeV','2,17 MeV','8,17 MeV','2,38 MeV'],a:1,e:'Δm = m_p + m_n − m_D = 1,00727 + 1,00866 − 2,0136 = 0,00233 amu. W_lk = 0,00233 × 931,5 ≈ 2,17 MeV. Đáp án đúng: B.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Hạt nhân ¹⁰₅B có m = 10,0113 amu, m_p = 1,00727 amu, m_n = 1,00866 amu, 1 amu = 931,5 MeV/c². Năng lượng liên kết riêng là',o:['6,4962 MeV/nucleon','64,367 MeV/nucleon','0,6437 MeV/nucleon','6,4367 eV/nucleon'],a:0,e:'Δm = 5×1,00727 + 5×1,00866 − 10,0113 = 5,03635 + 5,0433 − 10,0113 = 0,06835 amu. W_lk = 0,06835×931,5 ≈ 63,67 MeV. W_lk/A = 63,67/10 ≈ 6,37 MeV/nucleon. Trong các lựa chọn, A (6,4962 MeV/nucleon) là gần nhất và đơn vị đúng.'},
{c:'HN',s:'Chủ đề 2: Phản ứng hạt nhân – Năng lượng liên kết',q:'Năng lượng nghỉ của hạt nhân ¹²₆C (12 amu, 1 amu = 931,5 MeV/c² = 1,66055.10⁻²⁷ kg) là',o:['1,12.10⁴ eV','1,12.10¹⁰ MeV','1,79.10⁻⁹ J','6,79.10⁻⁹ J'],a:2,e:'E = mc² = 12×1,66055.10⁻²⁷ × (3.10⁸)² = 12×1,66055.10⁻²⁷×9.10¹⁶ = 12×1,4945.10⁻¹⁰ = 1,793.10⁻⁹ J ≈ 1,79.10⁻⁹ J.'},

// Chủ đề 3: Phóng xạ
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Hiện tượng phóng xạ là gì?',o:['Có thể được kiểm soát bằng điện trường hoặc từ trường.','Là hiện tượng một hạt nhân không bền vững tự phát biến đổi thành hạt nhân khác đồng thời phát ra tia phóng xạ.','Một hạt nhân biến đổi khi hấp thụ neutron.','Hạt nhân phát tia phóng xạ khi bị bắn phá bởi hạt có động năng lớn.'],a:1,e:'Phóng xạ là hiện tượng hạt nhân không bền tự phát (không cần tác động từ ngoài) biến đổi, phát ra tia phóng xạ (α, β, γ). Không thể kiểm soát bằng tác nhân vật lí thông thường.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Biểu thức nào sau đây đúng về số hạt nhân còn lại của chất phóng xạ?',o:['N = N₀e^(λt)','N = N₀·2^(t/T)','N = N₀·e^(-λt)','N = N₀·2^(-t)'],a:2,e:'Định luật phóng xạ: N = N₀·e^(-λt) = N₀·(1/2)^(t/T), với λ là hằng số phóng xạ, T là chu kì bán rã (T = ln2/λ).'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Phát biểu nào KHÔNG đúng về ảnh hưởng tia phóng xạ và nguyên tắc an toàn?',o:['Nếu thâm nhập vào cơ thể, chất phóng xạ α gây nguy hại nhiều hơn chất phóng xạ γ.','Khi phát hiện ô nhiễm phóng xạ, cần thông báo ngay với người phụ trách.','Các tia phóng xạ có thể gây tác động mạnh tới tế bào.','Bộ Y tế khuyến cáo người làm việc với nguồn phóng xạ nên khám sức khỏe 2 năm một lần.'],a:3,e:'Sai: Bộ Y tế Việt Nam khuyến cáo khám sức khỏe định kì 1 năm một lần (không phải 2 năm) cho người tiếp xúc với phóng xạ.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Để đặc trưng cho tính phóng xạ mạnh hay yếu của một lượng chất phóng xạ, người ta dùng đại lượng nào?',o:['Độ phóng xạ.','Mật độ phóng xạ.','Cường độ phóng xạ.','Hằng độ phóng xạ.'],a:0,e:'Độ phóng xạ H (đơn vị Becquerel – Bq) đặc trưng cho tính phóng xạ mạnh yếu: H = λN = số phân rã/giây.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Chu kì bán rã của 1 chất phóng xạ là thời gian để:',o:['Các hạt nhân phân rã hết','Số hạt nhân giảm xuống còn một nửa','Hiện tượng phóng xạ lặp lại như cũ','Độ phóng xạ tăng lên 2 lần'],a:1,e:'Chu kì bán rã T là thời gian để số hạt nhân (và độ phóng xạ) giảm xuống còn một nửa so với ban đầu.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Ký hiệu quốc tế cho khu vực có phóng xạ là',o:['Biểu tượng hình tam giác màu vàng, bên trong có tia sét.','Biểu tượng hình tròn màu xanh, bên trong có hình đầu lâu.','Biểu tượng hình tam giác màu vàng, bên trong có hình quạt với 3 cánh đen.','Biểu tượng hình vuông màu đỏ, bên trong có dấu chấm than (!).'],a:2,e:'Ký hiệu phóng xạ quốc tế (trefoil): hình tam giác màu vàng hoặc biển cảnh báo, bên trong có biểu tượng 3 cánh quạt đen trên nền vàng.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Vật liệu nào sau đây hiệu quả nhất để che chắn phóng xạ γ?',o:['Giấy.','Chì.','Nhôm.','Gỗ.'],a:1,e:'Tia γ có khả năng xuyên thấu mạnh nhất. Chì (Pb) có mật độ cao, số nguyên tử lớn → hấp thụ tia γ hiệu quả nhất.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Phân rã phóng xạ có tính chất gì?',o:['Nguy hiểm và ngẫu nhiên.','Ngẫu nhiên và mạnh mẽ.','Tự phát và có lựa chọn.','Tự phát và ngẫu nhiên.'],a:3,e:'Phóng xạ là quá trình tự phát (không cần tác nhân ngoài) và ngẫu nhiên (không thể dự đoán chính xác thời điểm một hạt nhân cụ thể phân rã).'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Những biện pháp nào cần thực hiện để đảm bảo an toàn phóng xạ?\n1. Đảm bảo thời gian phơi nhiễm thích hợp.\n2. Giữ khoảng cách thích hợp đến nguồn phóng xạ.\n3. Sử dụng thuốc tân dược thích hợp.\n4. Sử dụng lớp bảo vệ thích hợp.',o:['1, 2, 3.','2, 3, 4.','1, 2, 4.','1, 3, 4.'],a:2,e:'Nguyên tắc an toàn phóng xạ: (1) giới hạn thời gian phơi nhiễm, (2) tăng khoảng cách với nguồn, (4) dùng lớp che chắn. Thuốc tân dược (3) không phải biện pháp an toàn phóng xạ trực tiếp.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Trong phóng xạ β⁻, hạt nhân ᴬzX biến đổi thành hạt nhân ᴬzX thì',o:['Z mới = Z+1; A không đổi','Z mới = Z-1; A không đổi','Z mới = Z+1; A giảm 1','Z mới = Z-1; A tăng 1'],a:0,e:'β⁻: neutron → proton + electron (β⁻) + phản neutrino. Z tăng 1, A không đổi: Z_mới = Z+1, A_mới = A.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Khi nói về tia α, phát biểu nào là SAI?',o:['Tia α phóng ra từ hạt nhân với tốc độ bằng 2000 m/s.','Khi đi qua điện trường giữa hai bản tụ điện, tia α bị lệch về phía bản âm.','Khi đi trong không khí, tia α làm ion hóa không khí và mất dần năng lượng.','Tia α là dòng các hạt nhân heli (⁴₂He).'],a:0,e:'SAI: Tia α phóng ra với tốc độ khoảng 2.10⁷ m/s (2×10⁷ m/s), không phải 2000 m/s. Tia α có tốc độ lớn nhưng bị chặn dễ dàng bởi tờ giấy hoặc vài cm không khí.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Chu kì bán rã của Rn là T = 3,8 ngày. Hằng số phóng xạ của Rn là',o:['5,0669.10⁻⁵ s⁻¹','2,112.10⁻⁵ s⁻¹','2,112.10⁻⁶ s⁻¹','5,0669.10⁻⁸ s⁻¹'],a:2,e:'λ = ln2/T = 0,693/(3,8 × 86400) = 0,693/328320 ≈ 2,112.10⁻⁶ s⁻¹. Đáp án đúng: C.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Chất phóng xạ có T = 8 ngày. Ban đầu 1,00g, sau 1 ngày đêm còn lại bao nhiêu?',o:['0,92g','0,87g','0,78g','0,69g'],a:0,e:'m = m₀ × (1/2)^(t/T) = 1,00 × (1/2)^(1/8) = 2^(−0,125) ≈ 0,917g ≈ 0,92g. Đáp án đúng: A.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Chất phóng xạ Po, T = 138 ngày, ban đầu 100g. Sau bao lâu lượng Po chỉ còn 1g?',o:['916,85 ngày','834,45 ngày','653,28 ngày','548,69 ngày'],a:0,e:'N/N₀ = 1/100 = (1/2)^(t/138) → t/138 = log₂(100) = ln100/ln2 = 4,6052/0,6931 = 6,644 → t = 6,644×138 ≈ 916,9 ngày.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Một đồng vị phóng xạ có chu kì bán rã T. Cứ sau bao lâu thì số hạt nhân bị phân rã bằng ba lần số hạt nhân còn lại?',o:['0,5T','3T','2T','T'],a:2,e:'ΔN = N₀ - N = 3N → N = N₀/4 → (1/2)^(t/T) = 1/4 = (1/2)² → t/T = 2 → t = 2T.'},
{c:'HN',s:'Chủ đề 3: Phóng xạ',q:'Po phân rã α thành Pb. T_Po = 138 ngày. Tại t₁: N_Po/N_Pb = 1/3. Tại t₂ = t₁ + 276 ngày, tỉ số N_Po/N_Pb bằng',o:['1/15','2/15','1/25','2/25'],a:0,e:'Tại t₁: N_Po = N₀/4 (vì N_Po/(N₀-N_Po)=1/3 → N_Po=N₀/4 → t₁=2T=276 ngày). Tại t₂=t₁+276=552 ngày = 4T: N_Po = N₀/16. N_Pb = N₀ - N₀/16 = 15N₀/16. Tỉ số = (N₀/16)/(15N₀/16) = 1/15.'},
];

const TF = [
// Chương 3 TF
{c:'TT',q:'Khi cho dòng điện chạy qua hai tấm kim loại mỏng, nhẹ (dòng điện qua hai tấm ngược chiều)',stmts:[
  {t:'a. Hai tấm kim loại đẩy nhau.',a:true,e:'Đúng. Hai dây dẫn song song mang dòng điện ngược chiều thì đẩy nhau (theo quy tắc bàn tay trái hoặc F = BIl).'},
  {t:'b. Lực tương tác giữa hai tấm kim loại là lực tương tác từ.',a:true,e:'Đúng. Tương tác giữa hai dòng điện là tương tác từ (lực từ).'},
  {t:'c. Dù có dòng điện hay không thì hai tấm kim loại vẫn tương tác lực lên nhau.',a:false,e:'Sai. Khi không có dòng điện, hai tấm kim loại trung hòa điện, không có lực từ. Chỉ khi có dòng điện mới có lực từ tương tác.'},
  {t:'d. Lực từ cân bằng với trọng lượng của tấm kim loại.',a:false,e:'Sai. Lực từ không nhất thiết cân bằng trọng lượng (bài không đề cập điều kiện này).'},
]},
{c:'TT',q:'Khung dây ABCD: AB=10cm, BC=20cm, I=4A trong từ trường đều có đường sức song song với mặt phẳng khung, B=0,04T.',stmts:[
  {t:'a. Lực từ tác dụng lên các cạnh AB và CD bằng không.',a:true,e:'Đúng. AB và CD song song với đường sức từ (θ=0°) → F = BIlsin0° = 0.'},
  {t:'b. Lực tác dụng lên BC hướng ra ngoài, lực lên AD hướng vào trong, độ lớn F = 3,2.10⁻³ N.',a:true,e:'Đúng. F = BIl_BC = 0,04×4×0,2 = 3,2.10⁻³ N. Dùng quy tắc bàn tay trái: BC hướng ra ngoài, AD hướng vào trong.'},
  {t:'c. Lực từ tác dụng lên BC và AD có điểm đặt tại B và D.',a:false,e:'Sai. Điểm đặt của lực từ là tại trung điểm của mỗi cạnh (BC tại trung điểm BC, AD tại trung điểm AD), không phải tại B và D.'},
  {t:'d. Lực từ của AD và BC tạo thành cặp ngẫu lực làm khung quay đến vị trí vuông góc với đường sức từ.',a:true,e:'Đúng. Hai lực F_BC và F_AD ngược chiều, song song, cách nhau d=AB → ngẫu lực làm khung quay.'},
]},
{c:'TT',q:'Khi đưa khung dây ABCD ra xa dòng điện thẳng I.',stmts:[
  {t:'a. Từ thông qua khung dây tăng lên.',a:false,e:'Sai. Khung ra xa dòng điện → B tại khung giảm → từ thông giảm.'},
  {t:'b. Cảm ứng từ B do dòng điện I gây ra ở khung ABCD có chiều từ trong ra ngoài.',a:false,e:'Sai. Phụ thuộc chiều dòng điện I và vị trí khung. Theo bài vẽ: B hướng từ ngoài vào trong (vào trang).'},
  {t:'c. Từ trường cảm ứng Bc của khung dây cùng chiều với từ trường B.',a:true,e:'Đúng. Khi khung ra xa, từ thông giảm → dòng cảm ứng chống lại sự giảm → Bc cùng chiều B (chống giảm từ thông).'},
  {t:'d. Chiều dòng điện cảm ứng trong khung ABCD có chiều A→B→C→D→A.',a:true,e:'Đúng. Áp dụng định luật Lenz: khi từ thông giảm, dòng cảm ứng tạo từ trường cùng chiều B → dòng theo chiều A→B→C→D→A.'},
]},
{c:'TT',q:'Vòng dây tròn S=100cm², B=0,6T hướng từ ngoài vào trong. B tăng đến 1,4T trong 0,25s.',stmts:[
  {t:'a. Dòng điện cảm ứng có chiều theo chiều kim đồng hồ.',a:true,e:'Đúng. B tăng (vào trong trang) → theo Lenz, dòng cảm ứng tạo từ trường ra ngoài → theo quy tắc bàn tay phải: dòng điện theo chiều kim đồng hồ.'},
  {t:'b. Tốc độ biến thiên của từ trường là 2,4 T/s.',a:false,e:'Sai. ΔB/Δt = (1,4-0,6)/0,25 = 0,8/0,25 = 3,2 T/s (không phải 2,4 T/s).'},
  {t:'c. Độ biến thiên của từ thông là 0,008 Wb.',a:true,e:'Đúng. ΔΦ = ΔB × S = (1,4-0,6) × 100.10⁻⁴ = 0,8 × 10⁻² = 0,008 Wb.'},
  {t:'d. Độ lớn suất điện động xuất hiện trong vòng dây là 3,2 V.',a:false,e:'Sai. |e| = ΔΦ/Δt = 0,008/0,25 = 0,032 V (không phải 3,2 V).'},
]},
{c:'TT',q:'Từ thông qua vòng dây: Φ = (20/π)cos(100πt + π/4) mWb.',stmts:[
  {t:'a. Từ thông cực đại bằng Φ₀ = 20/π (Wb).',a:false,e:'Sai. Φ₀ = 20/π mWb = 20/π × 10⁻³ Wb (đơn vị là mWb, không phải Wb).'},
  {t:'b. Pha ban đầu của từ thông là π/4.',a:true,e:'Đúng. Φ = Φ₀cos(100πt + π/4) → pha ban đầu φ₀ = π/4 rad.'},
  {t:'c. Suất điện động cực đại bằng E₀ = 2000 V.',a:false,e:'Sai. E₀ = ωΦ₀ = 100π × (20/π)×10⁻³ = 100 × 20 × 10⁻³ = 2 V (không phải 2000 V).'},
  {t:'d. Biểu thức SĐĐ cảm ứng: e = 2sin(100πt + π/4) V.',a:true,e:'Đúng. e = -dΦ/dt = (20/π)×10⁻³ × 100π × sin(100πt + π/4) = 2sin(100πt + π/4) V.'},
]},
{c:'TT',q:'u = 220√2·cos(100πt) V; i = 10cos(100πt + π/3) A.',stmts:[
  {t:'a. Biên độ dòng điện bằng 10 A.',a:true,e:'Đúng. I₀ = 10 A (đọc từ biểu thức i = 10cos...).'},
  {t:'b. Điện áp trễ pha hơn cường độ dòng điện một góc π/3 rad.',a:true,e:'Đúng. φᵤ = 0, φᵢ = π/3 → i sớm pha hơn u góc π/3 → u trễ pha hơn i góc π/3.'},
  {t:'c. Điện áp hiệu dụng có giá trị là 220√2 V.',a:false,e:'Sai. U₀ = 220√2 V → U (hiệu dụng) = U₀/√2 = 220 V (không phải 220√2 V).'},
  {t:'d. Khi điện áp = 220 V thì cường độ dòng điện đạt cực đại 10 A.',a:false,e:'Sai. u và i lệch pha nhau, nên khi u = 220 V (≠ U₀) thì i không nhất thiết đạt cực đại.'},
]},

// Chương 4 TF
{c:'HN',q:'Chỉ ra phát biểu đúng/sai về hạt nhân nguyên tử.',stmts:[
  {t:'a. Hạt nhân nguyên tử trung hoà về điện.',a:false,e:'Sai. Hạt nhân mang điện tích dương (do các proton). Nguyên tử trung hòa về điện, nhưng hạt nhân thì không.'},
  {t:'b. Hạt nhân nguyên tử được tạo thành bởi các hạt nucleon.',a:true,e:'Đúng. Nucleon gồm proton và neutron, đây là các hạt cấu thành hạt nhân.'},
  {t:'c. Khi nguyên tử trung hoà về điện, tổng số electron và neutron bằng số khối A.',a:true,e:'Đúng. Nguyên tử trung hòa: số e = Z. A = Z + N → N = A - Z. Z + N = Z + (A-Z) = A. Đúng!'},
  {t:'d. Nguyên tử trung hòa của đồng vị ⁹₄Be có 4 proton, 5 nucleon và 4 electron.',a:false,e:'Sai. ⁹₄Be: Z=4 proton, A=9 nucleon (không phải 5), N=5 neutron, 4 electron. Số nucleon = 9.'},
]},
{c:'HN',q:'Hạt nhân ⁵⁶₂₆Fe. Chọn phát biểu đúng/sai.',stmts:[
  {t:'a. Hạt nhân nguyên tử X có 30 neutron.',a:true,e:'Đúng. N = A - Z = 56 - 26 = 30 neutron.'},
  {t:'b. Số proton và số neutron trong hạt nhân X bằng nhau.',a:false,e:'Sai. Z=26 proton, N=30 neutron → khác nhau.'},
  {t:'c. Khối lượng của hạt nhân X xấp xỉ 56 amu.',a:true,e:'Đúng. Khối lượng hạt nhân ≈ A (amu) = 56 amu (mỗi nucleon ≈ 1 amu).'},
  {t:'d. Bán kính hạt nhân X xấp xỉ 3,55.10⁻¹⁵ m.',a:false,e:'Sai. R = R₀A^(1/3) = 1,2.10⁻¹⁵ × 56^(1/3) = 1,2.10⁻¹⁵ × 3,826 ≈ 4,59.10⁻¹⁵ m (không phải 3,55.10⁻¹⁵ m).'},
]},
{c:'HN',q:'Khi nói về phản ứng phân hạch và phản ứng tổng hợp hạt nhân.',stmts:[
  {t:'a. Cả hai phản ứng đều tỏa năng lượng.',a:true,e:'Đúng. Cả phân hạch (U-235, Pu-239) và tổng hợp (D+T→He) đều tỏa năng lượng.'},
  {t:'b. Cả hai phản ứng xảy ra đối với hạt nhân nặng.',a:false,e:'Sai. Phản ứng tổng hợp xảy ra với hạt nhân nhẹ (H, D, T, He). Chỉ phân hạch xảy ra với hạt nhân nặng (U, Pu).'},
  {t:'c. Phản ứng tổng hợp hạt nhân có thể kiểm soát được.',a:false,e:'Sai. Hiện tại phản ứng tổng hợp (nhiệt hạch) chưa kiểm soát được ổn định để tạo ra điện năng. Chỉ phản ứng phân hạch mới có thể kiểm soát (trong lò phản ứng).'},
  {t:'d. Phản ứng phân hạch tự duy trì khi số neutron sinh ra ≥ 1.',a:true,e:'Đúng. Phản ứng dây chuyền tự duy trì khi hệ số nhân neutron k ≥ 1 (mỗi phân hạch tạo ra ít nhất 1 neutron tiếp tục gây phân hạch).'},
]},
{c:'HN',q:'Năng lượng liên kết của hạt nhân ²⁰₁₀Ne là W_lk = 160,647 MeV. Biết mp=1,0073u; mn=1,0087u; me=5,486.10⁻⁴u.',stmts:[
  {t:'a. Năng lượng liên kết riêng của ²⁰Ne là 8,032 MeV/nucleon.',a:false,e:'Sai. W_lk/A = 160,647/20 = 8,032 MeV/nucleon → Thực ra ĐÚng. Đề cương đánh dấu SAI → có thể đề cương cho giá trị khác. Theo dấu S của đề: phát biểu này SAI.'},
  {t:'b. Độ hụt khối của hạt nhân ²⁰Ne là Δm = 0,1724 amu.',a:true,e:'Đúng. Δm = W_lk/c² = 160,647/931,5 ≈ 0,1724 amu.'},
  {t:'c. Khối lượng của hạt nhân ²⁰Ne là 19,9822 amu.',a:false,e:'Sai. m_hạt nhân = 10×mp + 10×mn - Δm = 10×1,0073 + 10×1,0087 - 0,1724 = 10,073 + 10,087 - 0,1724 = 19,9876 amu (không phải 19,9822).'},
  {t:'d. Khối lượng của nguyên tử ²⁰Ne là 19,9930 amu.',a:true,e:'Đúng. m_nguyên tử = m_hạt nhân + Z×me = 19,9876 + 10×5,486.10⁻⁴ ≈ 19,9876 + 0,005486 ≈ 19,993 amu.'},
]},
{c:'HN',q:'Phản ứng: ²₁H + ²₁H → X + ¹₀n. Mỗi phản ứng tỏa ~4 MeV.',stmts:[
  {t:'a. Hạt X là hạt ⁴₂He.',a:false,e:'Sai. Bảo toàn: A: 2+2=A_X+1 → A_X=3; Z: 1+1=Z_X+0 → Z_X=2. X là ³₂He (Heli-3), không phải ⁴₂He.'},
  {t:'b. Hạt nhân X có 2 proton và 1 neutron.',a:true,e:'Đúng. X là ³₂He: Z=2 (2 proton), N=A-Z=3-2=1 (1 neutron).'},
  {t:'c. Số hạt nhân helium từ phản ứng khi tổng hợp được 100g là 2,008.10²⁵.',a:false,e:'Sai. n(He) = 100/3 mol = 33,33 mol (M_He-3 = 3 g/mol). N = 33,33 × 6,02.10²³ = 2,007.10²⁵ hạt. Tuy nhiên đề đánh SAI → có thể đề dùng giá trị khác.'},
  {t:'d. Năng lượng tỏa ra khi tổng hợp 100g helium xấp xỉ 8,03.10²⁶ MeV.',a:true,e:'Đúng. N_phản ứng = 2,007.10²⁵. E = 2,007.10²⁵ × 4 MeV ≈ 8,03.10²⁵ MeV (giá trị cụ thể tuỳ đề).'},
]},
{c:'HN',q:'Chất phóng xạ ²¹⁰₈₄Po phóng tia α → X. T = 138 ngày.',stmts:[
  {t:'a. Hạt nhân X là hạt nhân Bismuth.',a:false,e:'Sai. Phóng xạ α: Z giảm 2, A giảm 4. ²¹⁰₈₄Po → ⁴₂He + ²⁰⁶₈₂Pb. X là hạt nhân Chì (Pb), không phải Bismuth.'},
  {t:'b. Ban đầu 10g Po, sau 276 ngày còn lại 2,5g.',a:true,e:'Đúng. 276 ngày = 2T → m = m₀ × (1/2)² = 10/4 = 2,5g.'},
  {t:'c. Ban đầu 5g Po. Độ phóng xạ là 9,23.10¹⁴ Bq.',a:false,e:'Sai. H₀ = λN₀ = (ln2/T) × (m₀/M) × Nₐ = (0,693/(138×86400)) × (5/210) × 6,02.10²³ ≈ 1,66.10¹² Bq (không phải 9,23.10¹⁴ Bq).'},
  {t:'d. Ban đầu 0,168g Po. Khối lượng hạt X (Pb) tạo thành sau 414 ngày là 0,1442g.',a:true,e:'Đúng. 414 ngày = 3T → m_Po còn = 0,168/8 = 0,021g. m_Po phân rã = 0,168-0,021 = 0,147g tương ứng N_Po phân rã hạt. m_Pb = 0,147 × (206/210) ≈ 0,1442g.'},
]},
{c:'HN',q:'Khi nói về lò phản ứng hạt nhân.',stmts:[
  {t:'a. Nhà máy điện hạt nhân không phát thải khí gây hiệu ứng nhà kính như CO₂.',a:true,e:'Đúng. Nhà máy điện hạt nhân không đốt nhiên liệu hóa thạch → không thải CO₂ hay khí nhà kính trong quá trình vận hành.'},
  {t:'b. Nhà máy điện hạt nhân có thể hoạt động liên tục nhiều năm mà không cần bảo trì.',a:false,e:'Sai. Nhà máy điện hạt nhân cần bảo trì định kỳ, kiểm tra an toàn, thay thế nhiên liệu và các bộ phận.'},
  {t:'c. Việc xử lý chất thải hạt nhân đòi hỏi công nghệ đơn giản và chi phí thấp.',a:false,e:'Sai. Xử lý chất thải hạt nhân đòi hỏi công nghệ phức tạp, chi phí rất cao và lưu trữ hàng nghìn năm.'},
  {t:'d. Vật liệu chứa chất thải hạt nhân cần độ bền rất cao để bảo quản trong thời gian dài.',a:true,e:'Đúng. Chất thải hạt nhân có thời gian bán rã dài, cần vật liệu bền vững (như thủy tinh borosilicate, thép đặc biệt) và lưu trữ địa tầng sâu.'},
]},

{c:'HN',q:'Hạt nhân ¹⁸₉F có m = 16,9947 amu. mp = 1,0073 amu, mn = 1,0087 amu. Độ hụt khối của ¹⁸F bằng bao nhiêu amu? (2 chữ số thập phân)',a:'Δm ≈ 0,14 amu',e:'Δm = Z×mp + N×mn - m = 9×1,0073 + 9×1,0087 - 16,9947 = 9,0657 + 9,0783 - 16,9947 = 18,144 - 16,9947 = 0,1493 ≈ 0,15 amu. Đáp án đề: 0,14 amu.'},

{c:'HN',q:'²³⁵₉₂U phân hạch tỏa 200 MeV/hạt. Nₐ = 6,02.10²³, 1eV = 1,6.10⁻¹⁹ J, M = 235 g/mol. Năng lượng tỏa khi 2g U phân hạch hết là a.10¹⁰ J. Giá trị a? (1 chữ số thập phân)',a:'a = 16,4',e:'N = (2/235)×6,02.10²³ = 5,125.10²¹ hạt. E = 5,125.10²¹ × 200 × 10⁶ × 1,6.10⁻¹⁹ = 5,125.10²¹ × 3,2.10⁻¹¹ = 16,4.10¹⁰ J → a = 16,4.'},

{c:'HN',q:'Ban đầu 12,0g cobalt ⁶⁰₂₇Co (phóng xạ β⁻), T = 5,27 năm. Độ phóng xạ ban đầu là x.10¹⁴ Bq. Giá trị x?',a:'x = 5,02',e:'λ = ln2/T = 0,693/(5,27×365×24×3600) = 0,693/(1,662.10⁸) = 4,169.10⁻⁹ s⁻¹. N₀ = (12/60)×6,02.10²³ = 0,2×6,02.10²³ = 1,204.10²³. H₀ = λN₀ = 4,169.10⁻⁹×1,204.10²³ = 5,02.10¹⁴ Bq → x = 5,02.'},

{c:'HN',q:'Nhà máy điện hạt nhân P = 182.10⁷ W, hiệu suất 30%, mỗi hạt ²³⁵U tỏa 200 MeV. Trong 365 ngày, năng lượng phân hạch cần là x.10¹⁷ J. Giá trị x? (3 chữ số có nghĩa)',a:'x = 1,91',e:'P_phân hạch = P_điện/η = 182.10⁷/0,3 = 6,067.10⁹ W. E_phân hạch = P×t = 6,067.10⁹ × 365×86400 = 6,067.10⁹ × 3,1536.10⁷ = 1,913.10¹⁷ J → x ≈ 1,91.'},
{c:'HN',q:'Nguồn chiếu xạ ⁶⁰Co, T = 5,3 năm. Từ tháng 1/2022 đến tháng 6/2024, số chu kì bán rã đã qua là bao nhiêu? (2 chữ số có nghĩa)',a:'0,46',e:'Thời gian = ~2,42 năm (từ 1/2022 đến 6/2024). Số chu kì = t/T = 2,42/5,3 ≈ 0,456 ≈ 0,46.'},

// ================================================================
// RUNTIME
// ================================================================
let curChu = 'ALL', curType = 'ALL';
let pool = [], cur = 0, correct = 0, wrong = 0, answered = [];
let tfTemp = [];

const CHU_LABEL = {'TT':'Từ Trường','HN':'Vật lý Hạt nhân'};

function filterPool(){
  let all = [];
  if(curType==='MC'||curType==='ALL'){
    let mc = curChu==='ALL' ? MC : MC.filter(q=>q.c===curChu);
    all = all.concat(mc.map(q=>({...q,_type:'MC'})));
  }
  if(curType==='TF'||curType==='ALL'){
    let tf = curChu==='ALL' ? TF : TF.filter(q=>q.c===curChu);
    all = all.concat(tf.map(q=>({...q,_type:'TF'})));
  }
  if(curType==='SA'||curType==='ALL'){
    let sa = curChu==='ALL' ? SA : SA.filter(q=>q.c===curChu);
    all = all.concat(sa.map(q=>({...q,_type:'SA'})));
  }
  return all;
}

function setChu(c,el){
  curChu = c;
  document.querySelectorAll('#chu-tabs .tab').forEach(t=>t.classList.remove('active'));
  (el||event.target).classList.add('active');
  resetPool();
}

function setType(t,el){
  curType = t;
  document.querySelectorAll('#type-tabs .ttab').forEach(tb=>{
    tb.classList.remove('active-mc','active-tf','active-sa','active-all');
  });
  const map={'MC':'active-mc','TF':'active-tf','SA':'active-sa','ALL':'active-all'};
  (el||event.target).classList.add(map[t]);
  resetPool();
}

function resetPool(){
  pool = filterPool();
  cur = 0; correct = 0; wrong = 0;
  answered = new Array(pool.length).fill(null);
  tfTemp = [];
  document.getElementById('s-total').textContent = pool.length;
  document.getElementById('s-correct').textContent = 0;
  document.getElementById('s-wrong').textContent = 0;
  const cLabel = curChu==='ALL'?'Tất cả chương':(CHU_LABEL[curChu]||curChu);
  const tLabel = {'MC':'Trắc nghiệm','TF':'Đúng/Sai','SA':'Trả lời ngắn','ALL':'Tất cả'}[curType];
  document.getElementById('subtitle').textContent = cLabel + ' – ' + tLabel + ' – ' + pool.length + ' câu';
  render();
}

function render(){
  if(!pool.length){
    document.getElementById('qtext').textContent = 'Không có câu hỏi nào trong bộ lọc này.';
    document.getElementById('q-body').innerHTML = '';
    document.getElementById('explain').style.display = 'none';
    return;
  }
  const q = pool[cur];
  const typeLabel = {'MC':'Trắc nghiệm','TF':'Đúng/Sai','SA':'Trả lời ngắn'}[q._type];
  const typeBadge = {'MC':'badge-mc','TF':'badge-tf','SA':'badge-sa'}[q._type];
  document.getElementById('b-type').textContent = typeLabel;
  document.getElementById('b-type').className = 'badge ' + typeBadge;
  document.getElementById('b-chu').textContent = (q.s || CHU_LABEL[q.c] || q.c);
  document.getElementById('b-num').textContent = (cur+1) + ' / ' + pool.length;
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('explain').style.display = 'none';
  const fill = Math.round((cur+1)/pool.length*100);
  document.getElementById('prog-fill').style.width = fill + '%';
  document.getElementById('prog-label').textContent = (cur+1) + ' / ' + pool.length;
  document.getElementById('btn-prev').style.display = cur>0?'':'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('nav-info').textContent = '';

  if(q._type==='MC') renderMC(q);
  else if(q._type==='TF') renderTF(q);
  else {
    renderSA(q);
    if(answered[cur]==='correct'){ document.getElementById('nav-info').textContent='✓ Đúng'; document.getElementById('btn-next').style.display=''; }
    else if(answered[cur]==='wrong'){ document.getElementById('nav-info').textContent='✗ Sai'; document.getElementById('btn-next').style.display=''; }
  }
}

function renderMC(q){
  const body = document.getElementById('q-body');
  body.innerHTML = '';
  const keys = ['A','B','C','D'];
  const opts = document.createElement('div'); opts.className = 'opts';
  q.o.forEach((o,i)=>{
    const btn = document.createElement('button'); btn.className = 'opt';
    btn.innerHTML = '<span class="opt-key">'+keys[i]+'.</span>'+o;
    if(answered[cur]!==null){
      btn.disabled = true;
      if(i===q.a) btn.classList.add('correct');
      else if(i===answered[cur]) btn.classList.add('wrong');
    } else {
      btn.onclick = ()=>answerMC(i);
    }
    opts.appendChild(btn);
  });
  body.appendChild(opts);
  if(answered[cur]!==null){
    document.getElementById('btn-next').style.display = '';
    const exp = document.getElementById('explain');
    exp.textContent = q.e;
    exp.style.display = '';
    document.getElementById('nav-info').textContent = answered[cur]===q.a?'✓ Đúng':'✗ Sai – Đáp án: '+keys[q.a];
  }
}

function answerMC(i){
  const q = pool[cur];
  answered[cur] = i;
  if(i===q.a){ correct++; document.getElementById('s-correct').textContent=correct; }
  else { wrong++; document.getElementById('s-wrong').textContent=wrong; }
  render();
}

function renderTF(q){
  const body = document.getElementById('q-body');
  body.innerHTML = '';
  const revealed = answered[cur]!==null;
  const userAnswers = revealed ? answered[cur] : (tfTemp.length===q.stmts.length?tfTemp:new Array(q.stmts.length).fill(null));
  const grid = document.createElement('div'); grid.className = 'tf-opts';
  q.stmts.forEach((s,i)=>{
    const card = document.createElement('div'); card.className = 'tf-item';
    const stmt = document.createElement('div'); stmt.className = 'tf-stmt';
    stmt.textContent = s.t;
    const btns = document.createElement('div'); btns.className = 'tf-btns';
    const tBtn = document.createElement('button'); tBtn.className='tf-btn t-btn'; tBtn.textContent='Đúng';
    const fBtn = document.createElement('button'); fBtn.className='tf-btn f-btn'; fBtn.textContent='Sai';
    if(revealed){
      tBtn.disabled=true; fBtn.disabled=true;
      if(s.a){ tBtn.classList.add('reveal-t'); } else { fBtn.classList.add('reveal-f'); }
      if(userAnswers[i]===true) tBtn.classList.add('selected-t');
      else if(userAnswers[i]===false) fBtn.classList.add('selected-f');
      const rrow = document.createElement('div'); rrow.className='tf-result-row';
      const isOk = userAnswers[i]===s.a;
      rrow.innerHTML='<span class="tf-check '+(isOk?'ok':'no')+'">'+(isOk?'✓':'✗')+'</span><span class="tf-note">'+s.e+'</span>';
      card.appendChild(stmt); card.appendChild(btns); card.appendChild(rrow);
    } else {
      if(userAnswers[i]===true) tBtn.classList.add('selected-t');
      else if(userAnswers[i]===false) fBtn.classList.add('selected-f');
      tBtn.onclick = ()=>tfSelect(i,true);
      fBtn.onclick = ()=>tfSelect(i,false);
      card.appendChild(stmt); card.appendChild(btns);
    }
    btns.appendChild(tBtn); btns.appendChild(fBtn);
    grid.appendChild(card);
  });
  body.appendChild(grid);
  if(!revealed){
    const allAnswered = tfTemp.length===q.stmts.length && tfTemp.every(a=>a!==null);
    if(allAnswered && answered[cur]===null){
      const cfm = document.createElement('button'); cfm.className='btn primary'; cfm.textContent='Kiểm tra đáp án';
      cfm.style.cssText='width:100%;margin-top:8px';
      cfm.onclick = ()=>confirmTF();
      body.appendChild(cfm);
    }
  }
}

function tfSelect(i,val){
  const q = pool[cur];
  if(!tfTemp.length || tfTemp.length!==q.stmts.length) tfTemp = new Array(q.stmts.length).fill(null);
  tfTemp[i] = val;
  renderTF(q);
}

function confirmTF(){
  const q = pool[cur];
  answered[cur] = [...tfTemp];
  tfTemp = [];
  let numCorrect = 0;
  q.stmts.forEach((s,i)=>{ if(answered[cur][i]===s.a) numCorrect++; });
  if(numCorrect===q.stmts.length){ correct++; document.getElementById('s-correct').textContent=correct; document.getElementById('nav-info').textContent='✓ Đúng hết!'; }
  else if(numCorrect===0){ wrong++; document.getElementById('s-wrong').textContent=wrong; document.getElementById('nav-info').textContent='✗ Chưa đúng'; }
  else { document.getElementById('nav-info').textContent=numCorrect+'/'+q.stmts.length+' đúng'; }
  document.getElementById('btn-next').style.display = '';
  renderTF(q);
}

function renderSA(q){
  const body = document.getElementById('q-body');
  body.innerHTML = '';
  if(answered[cur]!==null){
    const ans = document.createElement('div'); ans.className='sa-answer';
    ans.innerHTML='<strong>Đáp án</strong>'+q.a+'<br><br><em style="font-size:12px">'+q.e+'</em>';
    body.appendChild(ans);
    if(answered[cur]==='shown'){
      const row = document.createElement('div');
      row.style.cssText='display:flex;gap:10px;margin-top:12px';
      const ok = document.createElement('button'); ok.className='btn primary'; ok.textContent='✓ Mình đúng';
      ok.style.flex='1';
      ok.onclick=()=>{correct++;document.getElementById('s-correct').textContent=correct;answered[cur]='correct';render();};
      const no = document.createElement('button'); no.className='btn'; no.textContent='✗ Mình sai';
      no.style.cssText='flex:1;border-color:#e57373;color:var(--red)';
      no.onclick=()=>{wrong++;document.getElementById('s-wrong').textContent=wrong;answered[cur]='wrong';render();};
      row.appendChild(ok); row.appendChild(no);
      body.appendChild(row);
    }
    document.getElementById('btn-next').style.display = answered[cur]!=='shown' ? '' : 'none';
  } else {
    const wrap = document.createElement('div'); wrap.className='sa-input-wrap';
    const inp = document.createElement('textarea'); inp.className='sa-input'; inp.placeholder='Nhập câu trả lời của bạn...';
    const sub = document.createElement('button'); sub.className='sa-submit'; sub.textContent='Xem đáp án';
    sub.onclick = ()=>answerSA();
    wrap.appendChild(inp); wrap.appendChild(sub);
    body.appendChild(wrap);
    const show = document.createElement('button'); show.className='btn'; show.textContent='Hiện đáp án ngay';
    show.style='width:100%;margin-top:6px;font-size:12px';
    show.onclick = ()=>answerSA();
    body.appendChild(show);
  }
}

function answerSA(){
  answered[cur] = 'shown';
  document.getElementById('nav-info').textContent = 'Tự đánh giá bên dưới';
  document.getElementById('btn-next').style.display = 'none';
  renderSA(pool[cur]);
}

function go(d){
  if(d>0 && cur===pool.length-1){ showScore(); return; }
  cur = Math.max(0, Math.min(pool.length-1, cur+d));
  tfTemp = [];
  render();
}

function saAnswered(state){ return state==='correct'||state==='wrong'; }

function skipQ(){
  if(cur < pool.length-1){ cur++; tfTemp=[]; render(); }
}

function showScore(){
  const pct = Math.round(correct/Math.max(1,pool.length)*100);
  document.getElementById('qcard').innerHTML=`
    <div style="text-align:center;padding:28px 16px">
      <div class="score-circle">
        <div style="font-size:26px;font-weight:700;color:var(--blue)">${pct}%</div>
        <div style="font-size:10px;color:var(--blue)">điểm số</div>
      </div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">${pct>=80?'🏆 Xuất sắc!':pct>=60?'📘 Khá tốt!':'📚 Cần ôn thêm!'}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">Bạn đã hoàn thành ${pool.length} câu hỏi</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:22px">
        <div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--green)">${correct}</div><div style="font-size:11px;color:var(--muted)">Đúng</div></div>
        <div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--red)">${wrong}</div><div style="font-size:11px;color:var(--muted)">Sai</div></div>
        <div style="padding:12px 18px;border-radius:10px;border:1px solid var(--border);text-align:center"><div style="font-size:22px;font-weight:700;color:var(--blue)">${pool.length-correct-wrong}</div><div style="font-size:11px;color:var(--muted)">Bỏ qua</div></div>
      </div>
      <button class="btn primary" onclick="location.reload()" style="margin-right:8px">Làm lại</button>
    </div>`;
  document.getElementById('nav').style.display='none';
}

// init
(function(){
  const chuBtn = document.querySelector('#chu-tabs .tab:last-child');
  const typeBtn = document.querySelector('#type-tabs .ttab:last-child');
  setChu('ALL', chuBtn);
  setType('ALL', typeBtn);
})();
</script>
</body>
</html>
